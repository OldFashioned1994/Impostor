/* =========================================================
   EL IMPOSTOR · EDICIÓN ARGENTA
   App web autocontenida (pass-and-play). Sin dependencias.
   Modo oscuro por defecto, estética vibrante.
   ========================================================= */
:root{
  /* Paleta oscura vibrante */
  --bg:#0E0B1A;        /* fondo base, noche */
  --bg2:#171228;       /* tarjetas */
  --bg3:#221A3D;       /* tarjetas elevadas / inputs */
  --linea:#322a52;     /* bordes suaves */
  --txt:#F5F1FF;       /* texto principal */
  --muted:#9b92bd;     /* texto secundario */
  --celeste:#4FC4FF;   /* cielo argentino */
  --sol:#FFC93C;       /* sol de mayo */
  --fuego:#FF6B35;     /* naranja fernet/atardecer */
  --magenta:#FF2E7E;   /* acento caliente */
  --verde:#2FE6A0;     /* éxito */
  --rojo:#FF4D6D;      /* peligro / impostor */
  --fb:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(255,46,126,.18), transparent 60%),
    radial-gradient(1000px 500px at -10% 10%, rgba(79,196,255,.16), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--txt); font-family:var(--fb);
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  padding:max(20px,env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
  display:flex; justify-content:center;
  -webkit-font-smoothing:antialiased;
}
#app{width:100%;max-width:460px}

/* ---------- Tipografía / encabezados ---------- */
.brand{text-align:center;margin:6px 0 18px}
.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700}
.logo{
  font-size:clamp(38px,12vw,56px);font-weight:900;line-height:.95;margin:6px 0 2px;letter-spacing:-1px;
  background:linear-gradient(100deg,var(--celeste),var(--sol) 45%,var(--fuego) 75%,var(--magenta));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 40px rgba(255,46,126,.15);
}
.flag{height:5px;width:84px;margin:8px auto 0;border-radius:99px;
  background:linear-gradient(90deg,var(--celeste),#fff 50%,var(--celeste))}
h2{font-size:26px;font-weight:900;margin:2px 0 10px;letter-spacing:-.5px;line-height:1.1}
.sub{color:var(--muted);font-size:15px;line-height:1.5;margin:0 0 18px}
.centro{text-align:center}

/* ---------- Tarjetas ---------- */
.card{background:var(--bg2);border:1px solid var(--linea);border-radius:20px;padding:18px;margin-bottom:14px;
  box-shadow:0 12px 30px rgba(0,0,0,.35)}

/* ---------- Botones ---------- */
.btn{font-family:var(--fb);font-size:17px;font-weight:800;padding:16px 18px;width:100%;
  border:none;border-radius:16px;cursor:pointer;letter-spacing:.3px;color:#0E0B1A;
  background:linear-gradient(100deg,var(--celeste),var(--magenta));
  box-shadow:0 10px 24px rgba(255,46,126,.28); transition:transform .07s ease, filter .15s, opacity .15s}
.btn:active{transform:translateY(2px) scale(.99)}
.btn:disabled{opacity:.35;box-shadow:none;cursor:not-allowed}
.btn.fuego{background:linear-gradient(100deg,var(--sol),var(--fuego));box-shadow:0 10px 24px rgba(255,107,53,.3)}
.btn.verde{background:linear-gradient(100deg,var(--verde),var(--celeste));box-shadow:0 10px 24px rgba(47,230,160,.28)}
.btn.ghost{background:transparent;color:var(--txt);border:1.5px solid var(--linea);box-shadow:none}
.btn.mini{width:auto;padding:14px 18px}
.btn + .btn{margin-top:10px}
.row-btns{display:flex;gap:10px}
.row-btns .btn{margin:0}

/* ---------- Inputs / chips ---------- */
label{display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  font-weight:800;margin:2px 0 8px}
.fila{display:flex;gap:8px;margin-bottom:14px}
input{flex:1;padding:15px 16px;font-size:16px;font-family:var(--fb);background:var(--bg3);
  border:1.5px solid var(--linea);border-radius:14px;color:var(--txt);outline:none}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--celeste)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;min-height:30px}
.chip{font-size:15px;font-weight:700;padding:9px 14px;border-radius:99px;cursor:pointer;
  background:var(--bg3);border:1px solid var(--linea);display:flex;align-items:center;gap:8px}
.chip b{color:var(--magenta);font-weight:900}
.empty{color:var(--muted);font-size:14px}

/* ---------- Opciones / segmentos ---------- */
.seg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.opt{flex:1;min-width:64px;padding:12px 10px;text-align:center;font-weight:800;font-size:15px;
  border:1.5px solid var(--linea);border-radius:14px;cursor:pointer;background:var(--bg3);color:var(--txt);
  transition:transform .06s}
.opt:active{transform:scale(.97)}
.opt.on{background:linear-gradient(100deg,var(--celeste),var(--magenta));color:#0E0B1A;border-color:transparent}
.opt:disabled{opacity:.3;cursor:not-allowed}

/* ---------- Toggle (switch) ---------- */
.toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--bg3);border:1.5px solid var(--linea);border-radius:14px;padding:14px 16px;
  margin-bottom:12px;cursor:pointer}
.toggle .t-txt{font-size:14px;line-height:1.35}
.toggle .t-txt b{font-weight:800;font-size:15px}
.toggle .t-txt span{display:block;color:var(--muted);font-size:13px;margin-top:2px}
.switch{width:50px;height:30px;border-radius:99px;background:#3a3357;flex-shrink:0;position:relative;
  transition:background .18s}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
  background:#fff;transition:transform .18s}
.toggle.on .switch{background:linear-gradient(100deg,var(--verde),var(--celeste))}
.toggle.on .switch::after{transform:translateX(20px)}

/* ---------- Reparto de roles (sobre) ---------- */
.passer{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:800}
.sobre{margin:14px auto;border-radius:24px;border:1.5px solid var(--linea);
  background:linear-gradient(160deg,var(--bg3),var(--bg2));min-height:260px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:26px;
  cursor:pointer;touch-action:none;position:relative;overflow:hidden;transition:border-color .2s}
.sobre.crew{border-color:var(--celeste);box-shadow:0 0 40px rgba(79,196,255,.18) inset}
.sobre.imp{border-color:var(--rojo);box-shadow:0 0 40px rgba(255,77,109,.2) inset}
.sobre .lock{font-size:42px}
.sobre .hint{font-size:15px;font-weight:800;letter-spacing:1px}
.sobre .tiny{font-size:12px;color:var(--muted)}
.role{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:800}
.palabra{font-size:34px;font-weight:900;line-height:1.1;letter-spacing:-.5px;
  background:linear-gradient(100deg,var(--celeste),var(--sol));-webkit-background-clip:text;background-clip:text;color:transparent}
.palabra.imp{background:linear-gradient(100deg,var(--rojo),var(--fuego));-webkit-background-clip:text;background-clip:text;color:transparent}
.cat-tag{font-size:13px;color:var(--muted)}
.consejo{font-size:14px;line-height:1.45;color:var(--txt);max-width:300px}

/* ---------- Orden de pistas ---------- */
.orden{display:flex;flex-direction:column;gap:8px;margin:6px 0 16px}
.orden .paso{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--linea);
  border-radius:14px;padding:12px 14px;font-weight:700}
.orden .num{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#0E0B1A;background:linear-gradient(100deg,var(--celeste),var(--magenta))}

/* ---------- Temporizador ---------- */
.timer{font-size:74px;font-weight:900;letter-spacing:2px;margin:10px 0;font-variant-numeric:tabular-nums}
.timer.urgente{color:var(--rojo);animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.55}}

/* ---------- Votación ---------- */
.voto{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1.5px solid var(--linea);
  border-radius:16px;padding:10px 12px;margin-bottom:10px;transition:border-color .15s}
.voto.lider{border-color:var(--sol);box-shadow:0 0 24px rgba(255,201,60,.15)}
.voto .nom{flex:1;font-weight:800;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.voto .cnt{font-weight:900;font-size:22px;min-width:30px;text-align:center;font-variant-numeric:tabular-nums}
.vbtn{width:46px;height:46px;border-radius:12px;border:none;font-size:24px;font-weight:900;cursor:pointer;
  background:var(--bg2);color:var(--txt);border:1.5px solid var(--linea);flex-shrink:0}
.vbtn:active{transform:scale(.92)}
.vbtn.plus{background:linear-gradient(100deg,var(--celeste),var(--magenta));color:#0E0B1A;border:none}

/* ---------- Resultado ---------- */
.veredicto{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:6px}
.ganador{font-size:30px;font-weight:900;margin:2px 0 4px;line-height:1.1}
.ganador.crew{color:var(--verde)}
.ganador.imp{color:var(--rojo)}
.nombres-imp{font-size:24px;font-weight:900;color:var(--rojo);margin:8px 0}
.dato{font-size:16px;margin:8px 0;line-height:1.4}
.dato b{font-weight:900}
.castigo{font-size:14px;color:var(--sol);font-style:italic;margin:14px 0 4px;line-height:1.4}

/* ---------- Tabla de posiciones ---------- */
.rank{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--linea)}
.rank:last-child{border-bottom:none}
.rank .pos{font-size:20px;width:34px;text-align:center;flex-shrink:0}
.rank .rnom{flex:1;font-weight:800;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank .pts{font-weight:900;font-size:20px;color:var(--sol);font-variant-numeric:tabular-nums}
.rank .pts small{font-size:12px;color:var(--muted);font-weight:700;margin-left:3px}
.rank.top .rnom{background:linear-gradient(100deg,var(--celeste),var(--sol));-webkit-background-clip:text;background-clip:text;color:transparent}

/* ---------- Misc ---------- */
.nav-top{display:flex;justify-content:flex-end;margin-bottom:4px}
.link{background:none;border:none;color:var(--muted);font-weight:700;font-size:14px;cursor:pointer;padding:6px 8px}
.aviso{background:var(--bg3);border:1px solid var(--linea);border-radius:14px;padding:12px 14px;
  font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.como{font-size:14px;line-height:1.6;color:var(--muted)}
.como b{color:var(--txt)}
.fade{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
:where(.btn,.opt,.vbtn,.chip,.toggle,.link,input,.sobre):focus-visible{outline:3px solid var(--sol);outline-offset:2px}
button.chip{font:inherit;color:inherit;text-align:inherit}
.timer.urgente{font-size:80px;text-shadow:0 0 18px rgba(255,77,109,.45)}
</style>

   ========================================================= */
const azar = a => a[Math.floor(Math.random()*a.length)];
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const fmtT = seg => Math.floor(seg/60)+":"+String(seg%60).padStart(2,"0");

/* Guardado opcional (offline) para no perder jugadores/puntajes al cerrar */
const STORE_KEY = "impostor_argenta_v2";
let faseGuardada = null; // fase de una ronda en curso recuperable (para "Retomar")
function guardar(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({
    jugadores:S.jugadores, scores:S.scores, cant:S.cant, categoria:S.categoria,
    pista:S.pista, usaTimer:S.usaTimer, dur:S.dur,
    fase:S.fase, ronda:S.ronda, palabra:S.palabra, catPal:S.catPal, imps:[...S.imps],
    turno:S.turno, arranca:S.arranca, consejo:S.consejo, frase:S.frase, castigo:S.castigo,
    votos:S.votos, acusado:S.acusado, caught:S.caught, robo:S.robo, delta:S.delta,
    usadas:S.usadas, seg:S.seg
  })); }catch(e){}
}
function cargar(){
  try{
    const d = JSON.parse(localStorage.getItem(STORE_KEY)||"null");
    if(d){
      S.jugadores = Array.isArray(d.jugadores)?d.jugadores.slice(0,12):[];
      S.scores = d.scores && typeof d.scores==="object" ? d.scores : {};
      S.cant = d.cant===2?2:1;
      S.categoria = (d.categoria==="Mezcla"||NOMBRES_CAT.includes(d.categoria))?d.categoria:"Mezcla";
      S.pista = !!d.pista; S.usaTimer = !!d.usaTimer;
      S.dur = [90,120,180].includes(d.dur)?d.dur:120;
      S.ronda = Number.isInteger(d.ronda)&&d.ronda>=0 ? d.ronda : 0;
      S.usadas = Array.isArray(d.usadas)?d.usadas:[];
      // ronda en curso: se ofrece "Retomar" en el inicio (no se reanuda sola para no exponer roles)
      faseGuardada = (d.fase && d.fase!=="inicio" && d.fase!=="tabla") ? d.fase : null;
      if(faseGuardada){
        S.palabra = d.palabra||""; S.catPal = d.catPal||"";
        S.imps = new Set(Array.isArray(d.imps)?d.imps:[]);
        S.turno = Number.isInteger(d.turno)?d.turno:0;
        S.arranca = d.arranca||""; S.consejo = d.consejo||""; S.frase = d.frase||""; S.castigo = d.castigo||"";
        S.votos = Array.isArray(d.votos)?d.votos:[];
        S.acusado = d.acusado!=null?d.acusado:null; S.caught = !!d.caught; S.robo = !!d.robo;
        S.delta = d.delta && typeof d.delta==="object" ? d.delta : {};
        S.seg = Number.isInteger(d.seg)?d.seg:S.dur;
      }
    }
  }catch(e){ faseGuardada=null; }
}
function retomarRonda(){
  if(!faseGuardada) return;
  S.fase = faseGuardada; faseGuardada = null;
  S.mostrando = false; S.visto = false; S.corriendo = false; pararTimer();
  render();
}

let S = {
  fase:"inicio",          // inicio | setup | reveal | pistas | votacion | resultado | tabla
  jugadores:[],           // nombres
  scores:{},              // { nombre: puntos } acumulado entre rondas
  cant:1,                 // cantidad de impostores (1 o 2)
  categoria:"Mezcla",
  pista:false,            // true = impostor "con pista" (sabe la categoría)
  usaTimer:false,         // temporizador opcional
  dur:120,                // duración en segundos
  ronda:0,
  // por ronda:
  palabra:"", catPal:"", imps:new Set(), turno:0, mostrando:false, visto:false,
  arranca:"", consejo:"", frase:"", castigo:"",
  seg:120, corriendo:false,
  usadas:[],              // palabras ya salidas (anti-repetición dentro de la sesión)
  votos:[],               // votos por jugador (índices)
  acusado:null,           // índice acusado (más votado) o null
  caught:false,           // impostor descubierto
  robo:false,             // impostor zafó adivinando la palabra
  delta:{}                // puntos otorgados esta ronda (para mostrar y revertir si cambia 'robo')
};
let timerId = null;
const app = document.getElementById("app");

/* =========================================================
   5) LÓGICA DE RONDA Y PUNTAJE
   ========================================================= */
function nuevaRonda(){
  const cat = S.categoria==="Mezcla" ? azar(NOMBRES_CAT) : S.categoria;
  S.catPal = cat;
  // anti-repetición: no repetir una palabra hasta agotar la categoría
  let pool = CATEGORIAS[cat].filter(w=>!S.usadas.includes(w));
  if(pool.length===0){ S.usadas = S.usadas.filter(w=>!CATEGORIAS[cat].includes(w)); pool = CATEGORIAS[cat]; }
  S.palabra = azar(pool);
  S.usadas.push(S.palabra);
  S.imps = new Set();
  while(S.imps.size < S.cant) S.imps.add(Math.floor(Math.random()*S.jugadores.length));
  S.turno=0; S.visto=false; S.mostrando=false;
  S.arranca = azar(S.jugadores);
  S.consejo = azar(CONSEJOS); S.frase = azar(FRASES); S.castigo = azar(CASTIGOS);
  S.ronda++;
  S.seg = S.dur; pararTimer();
  S.votos = S.jugadores.map(()=>0);
  S.acusado=null; S.caught=false; S.robo=false; S.delta={};
  // aseguro que todos los jugadores tengan entrada en el marcador
  S.jugadores.forEach(j=>{ if(S.scores[j]==null) S.scores[j]=0; });
  S.fase="reveal"; guardar(); render();
}

/* Cierra la votación: el más votado es el acusado (si hay empate o 0 votos => zafó) */
function cerrarVotacion(){
  const max = Math.max(...S.votos);
  if(max<=0){ S.acusado=null; }
  else {
    const lideres = S.votos.map((v,i)=>v===max?i:-1).filter(i=>i>=0);
    S.acusado = lideres.length===1 ? lideres[0] : null; // empate => sin acusación clara
  }
  S.caught = S.acusado!=null && S.imps.has(S.acusado);
  S.robo = false;
  aplicarPuntaje();
  S.fase="resultado"; guardar(); render();
}

/* Calcula y aplica el delta de puntos de la ronda.
   Reglas:
   - Impostor descubierto (y no robó la palabra): la tripulación suma +1 c/u.
   - Impostor zafa (no descubierto): cada impostor suma +2.
   - Impostor descubierto PERO adivina la palabra: cada impostor suma +3 (robó la ronda).
   Revierte el delta anterior antes de aplicar (por si se togglea 'robó'). */
function aplicarPuntaje(){
  // revertir delta previo
  for(const n in S.delta){ S.scores[n] = (S.scores[n]||0) - S.delta[n]; }
  const delta = {};
  S.jugadores.forEach((n,i)=>{
    const esImp = S.imps.has(i);
    let p = 0;
    if(S.robo){ if(esImp) p = 3; }                 // impostor robó la ronda adivinando
    else if(S.caught){ if(!esImp) p = 1; }         // tripulación ganó
    else { if(esImp) p = 2; }                      // impostor zafó
    if(p) delta[n] = (delta[n]||0) + p;
  });
  for(const n in delta){ S.scores[n] = (S.scores[n]||0) + delta[n]; }
  S.delta = delta;
}

function pararTimer(){ S.corriendo=false; if(timerId){clearInterval(timerId); timerId=null;} }
function toggleTimer(){
  if(S.corriendo){ pararTimer(); render(); return; }
  if(S.seg<=0) S.seg=S.dur; // reiniciar desde 0 recarga la duración en vez de quedar pegado
  S.corriendo=true;
  timerId=setInterval(()=>{
    S.seg=Math.max(0,S.seg-1);
    const t=document.getElementById("timer");
    if(t){ t.textContent=(S.seg<=15?"⏰ ":"")+fmtT(S.seg); t.classList.toggle("urgente",S.seg<=15); }
    const a=document.getElementById("timer-aria");
    if(a){ if(S.seg===15) a.textContent="Quedan 15 segundos"; else if(S.seg===0) a.textContent="Se acabó el tiempo"; }
    if(S.seg===0){ pararTimer(); render(); }
  },1000);
  render();
}

/* =========================================================
   6) RENDER (una función por pantalla)
   ========================================================= */
function brand(){
  return `<div class="brand fade">
    <div class="kicker">Pasá el celu · ${S.ronda?("Ronda "+S.ronda):"Previa, asado o juntada"}</div>
    <div class="logo">EL IMPOSTOR</div>
    <div class="flag"></div>
  </div>`;
}

function render(){
  if(S.fase==="inicio")     return pantallaInicio();
  if(S.fase==="setup")      return pantallaSetup();
  if(S.fase==="reveal")     return pantallaReveal();
  if(S.fase==="pistas")     return pantallaPistas();
  if(S.fase==="votacion")   return pantallaVotacion();
  if(S.fase==="resultado")  return pantallaResultado();
  if(S.fase==="tabla")      return pantallaTabla();
}

function pantallaReveal(){
  app.innerHTML = brand() + `
    <div class="card centro fade">
      <p class="passer">Tarjeta ${S.turno+1} de ${S.jugadores.length}</p>
      <h2 style="margin-top:6px">Pasale el celu a<br>${esc(S.jugadores[S.turno])}</h2>
      <div class="sobre" id="sobre" role="button" tabindex="0" aria-label="Mantené apretado o presioná Enter para ver tu rol en secreto"></div>
      <button class="btn" id="sig" ${S.visto?"":"disabled"}>
        ${ S.turno+1<S.jugadores.length ? "Listo, pasar al siguiente ▸" : "¡Todos listos! ▸" }
      </button>
      ${ S.turno>0 ? `<button class="btn ghost" id="atras">‹ Volver a la tarjeta anterior</button>` : "" }
    </div>`;

  const sobre=document.getElementById("sobre");
  const pintar=()=>{
    sobre.className="sobre";
    if(!S.mostrando){
      sobre.innerHTML=`<div class="lock">🔒</div>
        <div class="hint">MANTENÉ APRETADO PARA VER</div>
        <div class="tiny">Al soltar se oculta solo. No seas ortiba 👀</div>`;
    } else if(S.imps.has(S.turno)){
      sobre.classList.add("imp");
      sobre.innerHTML=`<div class="role">Tu rol</div>
        <div class="palabra imp">SOS EL IMPOSTOR</div>
        <p class="consejo">No conocés la palabra. ${esc(S.consejo)}</p>
        ${ S.pista ? `<div class="cat-tag">Pista: categoría «${esc(S.catPal)}»</div>` : "" }`;
    } else {
      sobre.classList.add("crew");
      sobre.innerHTML=`<div class="role">La palabra es</div>
        <div class="palabra">${esc(S.palabra)}</div>
        <div class="cat-tag">categoría: ${esc(S.catPal)}</div>`;
    }
  };
  pintar();

  const mostrar=e=>{ if(e&&e.preventDefault)e.preventDefault(); if(!S.mostrando){ S.mostrando=true; S.visto=true; pintar(); const b=document.getElementById("sig"); if(b) b.disabled=false; } };
  const ocultar=()=>{ if(S.mostrando){ S.mostrando=false; pintar(); } };
  sobre.addEventListener("pointerdown",e=>{ try{ sobre.setPointerCapture(e.pointerId); }catch(_){} mostrar(e); });
  sobre.addEventListener("pointerup",ocultar);
  sobre.addEventListener("pointercancel",ocultar);
  sobre.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); S.mostrando?ocultar():mostrar(e); } });
  sobre.addEventListener("blur",ocultar);
  sobre.addEventListener("contextmenu",e=>e.preventDefault());

  document.getElementById("sig").onclick=()=>{
    if(S.turno+1<S.jugadores.length){ S.turno++; S.visto=false; S.mostrando=false; guardar(); render(); }
    else { S.fase="pistas"; guardar(); render(); }
  };
  const atras=document.getElementById("atras");
  if(atras) atras.onclick=()=>{ if(S.turno>0){ S.turno--; S.visto=false; S.mostrando=false; guardar(); render(); } };
}

    </div>

    ${ S.usaTimer ? `<div class="card centro fade">
      <div class="timer ${S.seg<=15?"urgente":""}" id="timer" role="timer" aria-label="Tiempo restante de la ronda">${S.seg<=15?"⏰ ":""}${fmtT(S.seg)}</div>
      <div id="timer-aria" class="sr-only" aria-live="assertive"></div>
      <div class="row-btns">
        <button class="btn ghost" id="play">${S.corriendo?"‖ Pausa":"▸ Iniciar"}</button>
        <button class="btn ghost" id="reset">↺ ${fmtT(S.dur)}</button>
      </div>
    </div>` : "" }

    <button class="btn fuego" id="aVotar">Listos · IR A VOTAR ▸</button>
  `;

  if(S.usaTimer){
    document.getElementById("play").onclick=toggleTimer;
    document.getElementById("reset").onclick=()=>{ pararTimer(); S.seg=S.dur; render(); };
  }
  document.getElementById("aVotar").onclick=()=>{ pararTimer(); S.fase="votacion"; render(); };
}

/* ---------- VOTACIÓN ---------- */
function pantallaVotacion(){
  const max=Math.max(0,...S.votos);
  const totalVotos=S.votos.reduce((a,b)=>a+b,0);

  app.innerHTML = brand() + `
    <div class="card fade">
      <h2>¿Quién es el impostor?</h2>
      <p class="sub">Voten a mano alzada y cargá los votos con <b>+ / −</b>. El más votado queda acusado.</p>
      ${S.jugadores.map((n,i)=>`
        <div class="voto ${S.votos[i]===max&&max>0?"lider":""}">
          <button class="vbtn" data-m="${i}">−</button>
          <span class="cnt">${S.votos[i]}</span>
          <span class="nom">${esc(n)}</span>
          <button class="vbtn plus" data-p="${i}">+</button>
        </div>`).join("")}
    </div>
    <button class="btn fuego" id="cerrar" ${totalVotos>0?"":"disabled"}>CERRAR VOTACIÓN Y REVELAR ▸</button>
    <button class="btn ghost" id="volverPistas">‹ Volver a las pistas</button>
    <button class="btn ghost" id="saltar">Saltar votación (revelar sin acusar)</button>
  `;

  document.querySelectorAll(".vbtn[data-p]").forEach(b=>b.onclick=()=>{ const i=+b.dataset.p; S.votos[i]=Math.min(S.jugadores.length,S.votos[i]+1); guardar(); render(); });
  document.querySelectorAll(".vbtn[data-m]").forEach(b=>b.onclick=()=>{ const i=+b.dataset.m; S.votos[i]=Math.max(0,S.votos[i]-1); guardar(); render(); });
  document.getElementById("cerrar").onclick=cerrarVotacion;
  document.getElementById("volverPistas").onclick=()=>{ S.fase="pistas"; guardar(); render(); };
  document.getElementById("saltar").onclick=()=>{ S.votos=S.jugadores.map(()=>0); cerrarVotacion(); };
}

/* ---------- RESULTADO ---------- */
function pantallaResultado(){
  const nombresImp = S.jugadores.filter((_,i)=>S.imps.has(i)).map(esc).join(" y ");
  const ganoCrew = S.caught && !S.robo;
  const maxV = Math.max(0,...S.votos);
  const acusadoTxt = S.acusado!=null ? esc(S.jugadores[S.acusado]) : (maxV>0 ? "nadie: hubo empate en la votación, así que el impostor zafa" : "nadie (no se cargaron votos)");

  // resumen de puntos de la ronda
  const lineasDelta = Object.keys(S.delta).length
    ? Object.entries(S.delta).map(([n,p])=>`${esc(n)} +${p}`).join(" · ")
    : "Sin puntos esta ronda.";

  app.innerHTML = brand() + `
    <div class="card centro fade">
      <p class="veredicto">Veredicto</p>
      <div class="ganador ${ganoCrew?"crew":"imp"}">${ ganoCrew ? "🎉 ¡Ganó la tripulación!" : "😈 ¡Ganó el impostor!" }</div>
      <p class="dato">El grupo acusó a <b>${acusadoTxt}</b>.</p>
      <p class="dato">${S.imps.size>1?"Los impostores eran":"El impostor era"}:</p>
      <div class="nombres-imp">${nombresImp}</div>
      <p class="dato">La palabra era <b style="color:var(--celeste)">«${esc(S.palabra)}»</b><br><span class="cat-tag">(${esc(S.catPal)})</span></p>

      ${ S.caught ? `<div class="toggle ${S.robo?"on":""}" id="tg-robo" style="text-align:left" role="switch" tabindex="0" aria-checked="${S.robo}" aria-label="El impostor cantó la palabra">
        <div class="t-txt"><b>El impostor cantó la palabra</b><span>¿La adivinó al final? Si la dice, igual roba la ronda.</span></div>
        <div class="switch" aria-hidden="true"></div>
      </div>` : "" }

      <p class="castigo">${esc(S.castigo)}</p>
      <div class="aviso" style="margin-top:10px">Puntos de la ronda: ${esc(lineasDelta)}</div>
    </div>

    <button class="btn" id="otra">↻ OTRA RONDA (mismos jugadores)</button>
    <button class="btn verde" id="tabla">🏆 Tabla de posiciones</button>
    <button class="btn ghost" id="conf">⚙ Cambiar jugadores / ajustes</button>
  `;

  const tg=document.getElementById("tg-robo");
  if(tg) tg.onclick=()=>{ S.robo=!S.robo; aplicarPuntaje(); guardar(); render(); };
  document.getElementById("otra").onclick=nuevaRonda;
  document.getElementById("tabla").onclick=()=>{ S.fase="tabla"; render(); };
  document.getElementById("conf").onclick=()=>{ S.fase="setup"; render(); };
}

/* ---------- TABLA DE POSICIONES ---------- */
function tieneScores(){ return Object.values(S.scores).some(v=>v>0); }
function pantallaTabla(){
  const orden = Object.entries(S.scores).sort((a,b)=>b[1]-a[1]);
  const medallas=["🥇","🥈","🥉"];
  app.innerHTML = brand() + `
    <div class="card fade">
      <h2>Tabla de posiciones</h2>
      <p class="sub">Puntaje acumulado tras ${S.ronda} ${S.ronda===1?"ronda":"rondas"}.</p>
      ${ orden.length ? orden.map(([n,p],i)=>`
        <div class="rank ${i===0&&p>0?"top":""}">
          <span class="pos">${medallas[i]||(i+1)}</span>
          <span class="rnom">${esc(n)}</span>
          <span class="pts">${p}<small>pts</small></span>
        </div>`).join("") : `<p class="empty">Todavía no se jugó ninguna ronda.</p>` }
    </div>
    ${ S.ronda ? `<button class="btn fuego" id="otra">↻ OTRA RONDA</button>` : "" }
    <button class="btn ghost" id="conf">⚙ Ajustes / jugadores</button>
    <button class="btn ghost" id="reset">🗑 Reiniciar puntajes</button>
  `;
  const o=document.getElementById("otra"); if(o) o.onclick=nuevaRonda;
  document.getElementById("conf").onclick=()=>{ S.fase="setup"; render(); };
  document.getElementById("reset").onclick=()=>{
    S.scores={}; S.ronda=0; S.jugadores.forEach(j=>S.scores[j]=0); guardar();
    S.fase="inicio"; render();
  };
}

/* =========================================================
   7) ARRANQUE
   ========================================================= */
/* Teclado: Enter/Espacio activan los switches (role=switch) construidos como div */
document.addEventListener("keydown", e=>{
  if(e.key!=="Enter" && e.key!==" ") return;
  const t=e.target;
  if(t && t.getAttribute && t.getAttribute("role")==="switch"){ e.preventDefault(); t.click(); }
});
/* Guardado anti-perdida al pasar a segundo plano */
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) guardar(); });
window.addEventListener("pagehide", guardar);

cargar();
render();
</script>
</body>
</html>
