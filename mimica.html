@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
:root{
  --noche:#140a10; --noche2:#1f0f17; --butaca:#9c1b2e; --butaca2:#c0203a;
  --dorado:#e8b84b; --dorado2:#f6d27a; --crema:#f4e8cf; --suave:#b79d8a;

  --fd:'Bebas Neue','Arial Narrow',sans-serif; --fb:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(232,184,75,.10), transparent 60%),
    radial-gradient(140% 100% at 50% 120%, rgba(156,27,46,.30), transparent 55%),

  user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;

  display:flex; justify-content:center; overflow-x:hidden;
}
#app{width:100%;max-width:440px}
.claqueta{height:14px;background:repeating-linear-gradient(115deg,#111 0 18px,var(--crema) 18px 36px);

.exp{font-family:var(--fd);font-size:15px;letter-spacing:6px;color:var(--dorado)}
h1{font-family:var(--fd);font-size:54px;margin:2px 0 4px;letter-spacing:2px;line-height:.95;
  color:var(--crema);text-shadow:3px 3px 0 var(--butaca)}
h1 .b{color:var(--dorado)}
h2{font-family:var(--fd);font-size:34px;margin:6px 0 14px;letter-spacing:1px;line-height:1}
.sub{font-family:var(--fd);font-size:18px;letter-spacing:3px;color:var(--dorado);text-transform:uppercase}
.intro{font-size:14.5px;color:var(--suave);text-align:center;line-height:1.5;margin:0 auto 20px;max-width:360px}
.btn{font-family:var(--fd);font-size:23px;padding:15px 20px;width:100%;border:none;
  border-radius:12px;cursor:pointer;letter-spacing:1.5px;color:#1a0d12;
  background:linear-gradient(180deg,var(--dorado2),var(--dorado));
  box-shadow:0 5px 0 #9c7a23, 0 8px 18px rgba(0,0,0,.4);transition:transform .06s, box-shadow .06s}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #9c7a23}
.btn:disabled{opacity:.4;box-shadow:none;transform:none}
.btn.rojo{background:linear-gradient(180deg,var(--butaca2),var(--butaca));color:var(--crema);box-shadow:0 5px 0 #6f0f1d,0 8px 18px rgba(0,0,0,.4)}
.btn.rojo:active{box-shadow:0 1px 0 #6f0f1d}
.btn.sec{background:transparent;color:var(--crema);border:2px solid rgba(244,232,207,.4);box-shadow:none;font-size:19px}
.btn.sec:active{transform:translateY(2px);background:rgba(244,232,207,.06)}
.btn.verde{background:linear-gradient(180deg,var(--verde),var(--verde2));color:#fff;box-shadow:0 5px 0 #14592f,0 8px 18px rgba(0,0,0,.4)}
.btn.verde:active{box-shadow:0 1px 0 #14592f}
.btn.naranja{background:linear-gradient(180deg,var(--naranja),var(--naranja2));color:#fff;box-shadow:0 5px 0 #8c3e0f,0 8px 18px rgba(0,0,0,.4)}
.btn.naranja:active{box-shadow:0 1px 0 #8c3e0f}
.btn.mini{width:auto;padding:12px 16px;font-size:20px;flex:0 0 auto}
.row{display:flex;gap:10px}
.col{display:flex;flex-direction:column;gap:12px}
.card{background:linear-gradient(180deg,var(--noche2),rgba(31,15,23,.5));border:2px solid rgba(232,184,75,.25);
  border-radius:16px;padding:20px;cursor:pointer;transition:transform .08s, border-color .15s;text-align:center}
.card:active{transform:scale(.98)}
.card.on{border-color:var(--dorado);box-shadow:0 0 0 2px rgba(232,184,75,.3)}
.card .emoji{font-size:40px}
.card .t{font-family:var(--fd);font-size:26px;letter-spacing:1px;margin:6px 0 2px}
.card .d{font-size:13px;color:var(--suave);line-height:1.4}
label{font-family:var(--fd);font-size:16px;letter-spacing:3px;color:var(--dorado);display:block;margin:18px 0 8px}

@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

const shuffle = (arr) => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
};
const fmtTime = (s) => Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const catDe = (id) => CATS.find(c => c.id === id);

/* ===== audio (WebAudio, sin assets) ===== */
const Audio = (() => {
  let ctx = null;
  const get = () => {
    if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return null; } }
    if (ctx && ctx.state === "suspended") { try { ctx.resume(); } catch(e){} }
    return ctx;
  };
  const tone = (freq, dur, type, vol, when) => {
    const c = get(); if (!c) return;
    const t0 = c.currentTime + (when||0);
    const o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol||0.18, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.start(t0); o.stop(t0 + dur + 0.02);
  };
  return {
    unlock: get,
    tic:    () => tone(1100, 0.05, "square", 0.06, 0),
    acierto:() => { tone(660,0.12,"triangle",0.2,0); tone(880,0.12,"triangle",0.2,0.1); tone(1175,0.22,"triangle",0.2,0.2); },
    pasar:  () => tone(300,0.18,"sawtooth",0.14,0),
    fin:    () => { tone(200,0.5,"sawtooth",0.22,0); tone(150,0.6,"sawtooth",0.22,0.12); },
    win:    () => [523,659,784,1046].forEach((f,i)=>tone(f,0.3,"triangle",0.2,i*0.14))
  };
})();
const vibrar = (p) => { try { if (navigator.vibrate) navigator.vibrate(p); } catch(e){} };

/* =========================================================================
   ESTADO
   ========================================================================= */
const S = {
  scr: "inicio",            // inicio|modo|equipos|ajustes|turno|contando|jugando|resumen|tablero|ganador
  modo: "clasica",          // clasica|frente
  equipos: [
    { nombre:"Los Pochocleros", color:COLORES[0], pts:0, jugs:[] },
    { nombre:"Banda del Sillón", color:COLORES[1], pts:0, jugs:[] }
  ],
  cats: { clasicos:true, sagas:true, argentino:true, culto:true, picante:false },
  duracion: 90,
  rondasTot: 3,
  penalidad: false,
  pistasOn: true,

  mazo: [], idx: 0,
  equipoActual: 0,
  ronda: 1,
  seg: 90,
  corriendo: false,
  peli: null,
  turno: { aciertos:0, salteos:0, lista:[] },
  pistaUsada: 0,
  cuenta: 3,
  muerte: null,             // {empatados:[i], cola:[i], puntos:{}}
  tiltOk: false, tiltActivo: false,
  stats: {}                 // por equipo: {aciertos, salteos, pistas}
};

let timerId = null;
const tilt = { base:null, armado:true, escuchando:false, handler:null, gotEvent:false };
const app = document.getElementById("app");

/* ===== mazo ===== */
function construirMazo(){
  let pool = [];
  CATS.forEach(c => { if (S.cats[c.id]) BANCO[c.id].forEach(t => pool.push({ titulo:t, cat:c.id })); });
  if (pool.length === 0) BANCO.clasicos.forEach(t => pool.push({ titulo:t, cat:"clasicos" }));
  S.mazo = shuffle(pool); S.idx = 0;
}
function proxima(){
  if (!S.mazo.length) return;
  if (S.idx >= S.mazo.length) { S.mazo = shuffle(S.mazo); S.idx = 0; }
  S.peli = S.mazo[S.idx]; S.idx += 1;
}

/* ===== cronómetro ===== */
function pararTimer(){ S.corriendo = false; if (timerId){ clearInterval(timerId); timerId = null; } }
function arrancarTimer(){
  pararTimer(); S.corriendo = true;
  timerId = setInterval(() => {
    S.seg -= 1;
    if (S.seg < 0) S.seg = 0;
    const t = document.getElementById("timer");
    if (t){ t.textContent = fmtTime(S.seg); t.classList.toggle("urgente", S.seg <= 10); }
    const tf = document.getElementById("timerFrente");
    if (tf) tf.textContent = fmtTime(S.seg);
    if (S.seg <= 10 && S.seg > 0) Audio.tic();
    if (S.seg <= 0) { pararTimer(); finTurno(); }
  }, 1000);
}

/* ===== giroscopio (modo frente) ===== */
function empezarTilt(){
  tilt.base = null; tilt.armado = true; tilt.gotEvent = false;
  const UMBRAL = 42, REARME = 22;
  tilt.handler = function(e){
    if (e.beta == null) return;
    tilt.gotEvent = true;
    if (!S.tiltActivo){ S.tiltActivo = true; const h = document.getElementById("frenteFb"); if (h) h.style.display = "none"; const hint = document.getElementById("frenteHint"); if (hint) hint.style.display = "block"; }
    if (tilt.base === null){ tilt.base = e.beta; return; }
    const d = e.beta - tilt.base;
    if (tilt.armado){
      if (d < -UMBRAL){ tilt.armado = false; if (S.corriendo) registrar(true); }
      else if (d > UMBRAL){ tilt.armado = false; if (S.corriendo) registrar(false); }
    } else if (Math.abs(d) < REARME){ tilt.armado = true; }
  };
  window.addEventListener("deviceorientation", tilt.handler, true);
  tilt.escuchando = true;
}
function pararTilt(){
  if (tilt.escuchando && tilt.handler) window.removeEventListener("deviceorientation", tilt.handler, true);
  tilt.escuchando = false;
}
function pedirPermisoSensor(){
  return new Promise((resolve) => {
    try {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission().then(r => resolve(r === "granted")).catch(() => resolve(false));
        return;
      }
    } catch(e){ return resolve(false); }
    resolve(typeof DeviceOrientationEvent !== "undefined"); // Android / sin gate de permiso
  });
}

/* =========================================================================
   FLUJO DE JUEGO
   ========================================================================= */
function iniciarPartida(){
  Audio.unlock();
  construirMazo();
  S.stats = {};
  S.equipos.forEach(e => e.pts = 0);
  S.ronda = 1; S.muerte = null;
  irAlTurno(0);
}
function irAlTurno(idx){
  S.equipoActual = idx;
  S.turno = { aciertos:0, salteos:0, lista:[] };
  S.pistaUsada = 0;
  S.seg = S.muerte ? 30 : S.duracion;
  pararTimer();
  S.scr = "turno"; render();
}
function comenzarCuenta(){
  Audio.unlock();
  const arrancar = () => {
    proxima();
    S.cuenta = 3; S.scr = "contando"; render();
    tickCuenta();
  };
  if (S.modo === "frente"){
    pedirPermisoSensor().then(ok => { S.tiltOk = ok; S.tiltActivo = false; arrancar(); });
  } else { arrancar(); }
}
function tickCuenta(){
  Audio.tic();
  setTimeout(() => {
    S.cuenta -= 1;
    if (S.cuenta <= 0){
      if (S.modo === "frente") empezarTilt();
      S.scr = "jugando"; render(); arrancarTimer();
    } else { render(); tickCuenta(); }
  }, 800);
}

function mostrarFlash(tipo, titulo){
  const old = document.getElementById("flash"); if (old) old.remove();
  const div = document.createElement("div");
  div.id = "flash";
  div.className = "flash " + (tipo === "ok" ? "ok" : "no");
  const big = tipo === "ok"
    ? (S.modo === "frente" ? "¡ACERTARON!" : "¡BIEN AHÍ!")
    : (S.modo === "frente" ? "PASAMOS" : "SIGUIENTE");
  div.innerHTML = '<div class="big">'+big+'</div><div class="pl">'+esc(titulo)+'</div>';
  document.body.appendChild(div);
  setTimeout(() => { if (div.parentNode) div.remove(); }, 720);
}

function registrar(acierto){
  if (!S.peli || !S.corriendo) return;
  const eq = S.equipoActual;
  const s = S.stats[eq] || { aciertos:0, salteos:0, pistas:0 };
  const titulo = S.peli.titulo;
  if (acierto){
    const vale = S.pistaUsada > 0 ? 0 : 1;
    Audio.acierto(); vibrar(60);
    S.equipos[eq].pts += vale;
    S.turno.aciertos += 1;
    S.turno.lista.push({ titulo, ok:true, vale });
    s.aciertos += 1;
    mostrarFlash("ok", titulo);
  } else {
    Audio.pasar(); vibrar(25);
    if (S.penalidad) S.equipos[eq].pts = Math.max(0, S.equipos[eq].pts - 1);
    S.turno.salteos += 1;
    S.turno.lista.push({ titulo, ok:false });
    s.salteos += 1;
    mostrarFlash("no", titulo);
  }
  S.stats[eq] = s;
  S.pistaUsada = 0;
  proxima();
  pintarJugando();
}
function usarPista(){
  if (!S.pistasOn || !S.peli) return;
  S.pistaUsada += 1;
  const eq = S.equipoActual;
  const s = S.stats[eq] || { aciertos:0, salteos:0, pistas:0 };
  s.pistas += 1; S.stats[eq] = s;
  pintarJugando();
}
function finTurno(){
  pararTimer(); pararTilt();
  Audio.fin(); vibrar([120,60,120]);
  const f = document.getElementById("flash"); if (f) f.remove();
  S.scr = "resumen"; render();
}
function cerrarTurno(){
  if (S.muerte){ avanzarMuerte(); return; }
  const ultimo = S.equipoActual === S.equipos.length - 1;
  if (!ultimo){ irAlTurno(S.equipoActual + 1); return; }
  if (S.ronda >= S.rondasTot){
    const emp = liderazgo();
    if (emp.length > 1) iniciarMuerte(emp);
    else { S.scr = "ganador"; render(); Audio.win(); vibrar([100,50,100,50,200]); }
  } else { S.scr = "tablero"; render(); }
}
function siguienteRonda(){ S.ronda += 1; irAlTurno(0); }
function liderazgo(){
  const max = Math.max.apply(null, S.equipos.map(e => e.pts));
  const out = [];
  S.equipos.forEach((e,i) => { if (e.pts === max) out.push(i); });
  return out;
}

/* ===== muerte súbita ===== */
function iniciarMuerte(empatados){
  S.muerte = { empatados:empatados.slice(), cola:empatados.slice(), puntos:{} };
  irAlTurno(empatados[0]);
}
function avanzarMuerte(){
  const m = S.muerte;
  m.puntos[S.equipoActual] = S.turno.aciertos;
  m.cola = m.cola.slice(1);
  if (m.cola.length > 0){ irAlTurno(m.cola[0]); return; }
  // todos jugaron el desempate
  const max = Math.max.apply(null, m.empatados.map(i => m.puntos[i] || 0));
  const ganan = m.empatados.filter(i => (m.puntos[i] || 0) === max);
  if (ganan.length === 1){
    S.equipos[ganan[0]].pts += 0.5; // medio punto desempata el marcador
    S.muerte = null;
    S.scr = "ganador"; render(); Audio.win(); vibrar([100,50,100,50,200]);
  } else {
    iniciarMuerte(ganan); // sigue el empate: otra vuelta entre los que empataron
  }
}

/* ===== equipos ===== */
function addEquipo(){
  if (S.equipos.length >= 6) return;
  S.equipos.push({ nombre:"Equipo "+(S.equipos.length+1), color:COLORES[S.equipos.length % COLORES.length], pts:0, jugs:[] });
  render();
}
function delEquipo(i){ if (S.equipos.length <= 2) return; S.equipos.splice(i,1); render(); }

    app.innerHTML = h;
    document.getElementById("next").onclick = siguienteRonda;
    document.getElementById("aj").onclick = () => { S.scr = "ajustes"; render(); };
    return;
  }

  if (f === "ganador"){
    const orden = S.equipos.map((e,i)=>({e,i})).sort((a,b)=>b.e.pts-a.e.pts);
    const camp = orden[0];
    let masExp = null, masSalt = null, maxA = -1, maxS = -1;
    Object.keys(S.stats).forEach(k => {
      const v = S.stats[k];
      if (v.aciertos > maxA){ maxA = v.aciertos; masExp = +k; }
      if (v.salteos > maxS){ maxS = v.salteos; masSalt = +k; }
    });
    let h = headHTML("¡Caso cerrado!")+
      '<div class="center"><div style="font-size:64px">🏆</div>'+
      '<h2 style="color:'+camp.e.color+';font-size:46px;margin:4px 0 2px">'+esc(camp.e.nombre)+'</h2>'+
      '<p class="sub">¡GANADOR!</p></div><div style="margin:16px 0">';
    orden.forEach(o => {
      h += '<div class="score-line '+(o.i===camp.i?"lider":"")+'">'+
        '<span class="nm"><span class="dot-inline" style="background:'+o.e.color+'"></span>'+esc(o.e.nombre)+'</span>'+
        '<span class="pts">'+Math.floor(o.e.pts)+'</span></div>';
    });
    h += '</div>';
    if (masExp !== null && (maxA>0 || maxS>0)){
      h += '<label>De yapa</label>';
      if (maxA>0) h += '<div class="stat"><span>🎭 El más expresivo</span><span class="v">'+esc(S.equipos[masExp].nombre)+'</span></div>';
      if (maxS>0) h += '<div class="stat"><span>🙈 El que más salteó</span><span class="v">'+esc(S.equipos[masSalt].nombre)+'</span></div>';
    }
    h += '<div class="col" style="margin-top:20px"><button class="btn rojo" id="revan">↻ REVANCHA (mismos equipos)</button>'+
      '<button class="btn sec" id="home">🏠 Volver al inicio</button></div>';
    app.innerHTML = h;
    document.getElementById("revan").onclick = iniciarPartida;
    document.getElementById("home").onclick = () => { S.scr = "inicio"; render(); };
    return;
  }
}

/* ===== pantalla de juego (con actualización in-place para fluidez) ===== */
function pintarJugando(full){
  const eq = S.equipos[S.equipoActual];

  if (S.modo === "frente"){
    if (full){
      const usaBotones = !S.tiltOk || !S.tiltActivo;
      app.innerHTML =
        '<div class="frente-play">'+
          '<div class="tt" id="timerFrente">'+fmtTime(S.seg)+'</div>'+
          '<p class="peli frente" id="peliF">'+(S.peli?esc(S.peli.titulo):"")+'</p>'+
          '<div class="fb-row" id="frenteFb" style="display:'+(usaBotones?"flex":"none")+'">'+
            '<button class="btn naranja" style="flex:1" id="bPasar">PASAR ↑</button>'+
            '<button class="btn verde" style="flex:1" id="bAcerto">ACERTÓ ↓</button></div>'+
          '<p class="hint" id="frenteHint" style="display:'+(usaBotones?"none":"block")+'">Incliná el celu hacia <b>abajo</b> = acertaron · hacia <b>arriba</b> = pasar.<br>Volvé al centro entre cada peli.</p>'+
          '<button class="link" style="position:absolute;bottom:8px;color:rgba(244,232,207,.4)" id="terminar">terminar turno</button>'+
        '</div>';
      const bp = document.getElementById("bPasar"); if (bp) bp.onclick = () => registrar(false);
      const ba = document.getElementById("bAcerto"); if (ba) ba.onclick = () => registrar(true);
      document.getElementById("terminar").onclick = finTurno;
    } else {
      const p = document.getElementById("peliF"); if (p && S.peli) p.textContent = S.peli.titulo;
    }
    return;
  }

  // modo clásico
  const meta = S.peli ? META[S.peli.titulo] : null;
  const cat = S.peli ? catDe(S.peli.cat) : null;
  if (full){
    let h = '<div class="center" style="display:flex;justify-content:space-between;align-items:center">'+
        '<span class="tag" style="border-color:'+eq.color+';color:'+eq.color+'">'+esc(eq.nombre)+'</span>'+
        '<span class="muted" id="cont">✓ '+S.turno.aciertos+' · ⤳ '+S.turno.salteos+'</span></div>'+
      '<div class="timer'+(S.seg<=10?" urgente":"")+'" id="timer">'+fmtTime(S.seg)+'</div>'+
      '<div class="card" style="cursor:default;min-height:170px;display:flex;flex-direction:column;justify-content:center" id="cardPeli">'+
        contenidoCardClasico(meta, cat)+'</div>';
    if (S.pistasOn) h += '<div class="center" style="margin:10px 0"><button class="link" id="pista">💡 Pedir pista (esta peli pasa a valer 0)</button></div>';
    h += '<div class="row" style="margin-top:6px">'+
        '<button class="btn naranja" style="flex:1" id="bPasar">SALTEAR</button>'+
        '<button class="btn verde" style="flex:2" id="bAcerto">¡ADIVINARON!</button></div>'+
      '<div class="foot"><button class="link" id="terminar">terminar turno antes de tiempo</button></div>';
    app.innerHTML = h;
    document.getElementById("bPasar").onclick = () => registrar(false);
    document.getElementById("bAcerto").onclick = () => registrar(true);
    document.getElementById("terminar").onclick = finTurno;
    const pst = document.getElementById("pista"); if (pst) pst.onclick = usarPista;
  } else {
    const card = document.getElementById("cardPeli"); if (card) card.innerHTML = contenidoCardClasico(meta, cat);
    const cont = document.getElementById("cont"); if (cont) cont.textContent = "✓ "+S.turno.aciertos+" · ⤳ "+S.turno.salteos;
  }
}
function contenidoCardClasico(meta, cat){
  let h = "";
  if (cat) h += '<span class="tag" style="margin-bottom:10px">'+cat.emoji+' '+esc(cat.nombre)+'</span>';
  if (S.peli) h += '<p class="peli">'+esc(S.peli.titulo)+'</p>';
  if (S.pistaUsada > 0 && S.peli){
    const t = S.peli.titulo;
    h += '<div class="pista-box">';
    h += '<div>🎞️ <b>Género:</b> '+esc((meta&&meta.g)||(cat?cat.genero:"película"))+'</div>';
    if (S.pistaUsada >= 2) h += '<div>🔤 <b>Empieza con:</b> «'+esc(t[0].toUpperCase())+'» · '+t.split(" ").length+' palabra(s)</div>';
    if (S.pistaUsada >= 3){
      if (meta && meta.a) h += '<div>📅 <b>Año:</b> '+meta.a+'</div>';
      if (meta && meta.p) h += '<div>⭐ <b>Protagónico:</b> '+esc(meta.p)+'</div>';
      if (!meta) h += '<div class="muted">No hay más datos de esta peli. ¡A puro gesto!</div>';
    }
    h += '</div>';
  }
  return h;
}

render();
</script>
