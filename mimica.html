@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
:root{
  --noche:#140a10; --noche2:#1f0f17; --butaca:#9c1b2e; --butaca2:#c0203a;
  --dorado:#e8b84b; --dorado2:#f6d27a; --crema:#f4e8cf; --suave:#b79d8a;
  --verde:#2faf5e; --verde2:#1d7d42; --naranja:#e8762b; --naranja2:#c25a18;
  --fd:'Bebas Neue','Arial Narrow',sans-serif; --fb:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(232,184,75,.10), transparent 60%),
    radial-gradient(140% 100% at 50% 120%, rgba(156,27,46,.30), transparent 55%),
    var(--noche);
  color:var(--crema); font-family:var(--fb);
  user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  padding:max(18px, env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
  display:flex; justify-content:center; overflow-x:hidden;
}
#app{width:100%;max-width:440px}
.claqueta{height:14px;background:repeating-linear-gradient(115deg,#111 0 18px,var(--crema) 18px 36px);

.exp{font-family:var(--fd);font-size:15px;letter-spacing:6px;color:var(--dorado)}

  color:var(--crema);text-shadow:3px 3px 0 var(--butaca)}
h1 .b{color:var(--dorado)}
h2{font-family:var(--fd);font-size:34px;margin:6px 0 14px;letter-spacing:1px;line-height:1}
.sub{font-family:var(--fd);font-size:18px;letter-spacing:3px;color:var(--dorado);text-transform:uppercase}
.intro{font-size:14.5px;color:var(--suave);text-align:center;line-height:1.5;margin:0 auto 20px;max-width:360px}
.btn{font-family:var(--fd);font-size:23px;padding:15px 20px;width:100%;border:none;
  border-radius:12px;cursor:pointer;letter-spacing:1.5px;color:#1a0d12;
  background:linear-gradient(180deg,var(--dorado2),var(--dorado));
  box-shadow:0 5px 0 #9c7a23, 0 8px 18px rgba(0,0,0,.4);transition:transform .06s, box-shadow .06s}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #9c7a23}
.btn:disabled{opacity:.4;box-shadow:none;transform:none}
.btn.rojo{background:linear-gradient(180deg,var(--butaca2),var(--butaca));color:var(--crema);box-shadow:0 5px 0 #6f0f1d,0 8px 18px rgba(0,0,0,.4)}
.btn.rojo:active{box-shadow:0 1px 0 #6f0f1d}
.btn.sec{background:transparent;color:var(--crema);border:2px solid rgba(244,232,207,.4);box-shadow:none;font-size:19px}
.btn.sec:active{transform:translateY(2px);background:rgba(244,232,207,.06)}
.btn.verde{background:linear-gradient(180deg,var(--verde),var(--verde2));color:#fff;box-shadow:0 5px 0 #14592f,0 8px 18px rgba(0,0,0,.4)}
.btn.verde:active{box-shadow:0 1px 0 #14592f}
.btn.naranja{background:linear-gradient(180deg,var(--naranja),var(--naranja2));color:#fff;box-shadow:0 5px 0 #8c3e0f,0 8px 18px rgba(0,0,0,.4)}
.btn.naranja:active{box-shadow:0 1px 0 #8c3e0f}
.btn.mini{width:auto;padding:12px 16px;font-size:20px}
.row{display:flex;gap:10px}
.col{display:flex;flex-direction:column;gap:12px}
.card{background:linear-gradient(180deg,var(--noche2),rgba(31,15,23,.5));border:2px solid rgba(232,184,75,.25);
  border-radius:16px;padding:20px;cursor:pointer;transition:transform .08s, border-color .15s;text-align:center}
.card:active{transform:scale(.98)}
.card.on{border-color:var(--dorado);box-shadow:0 0 0 2px rgba(232,184,75,.3)}
.card .emoji{font-size:40px}
.card .t{font-family:var(--fd);font-size:26px;letter-spacing:1px;margin:6px 0 2px}
.card .d{font-size:13px;color:var(--suave);line-height:1.4}
label{font-family:var(--fd);font-size:16px;letter-spacing:3px;color:var(--dorado);display:block;margin:18px 0 8px}
input{flex:1;padding:13px 14px;font-size:16px;font-family:var(--fb);background:rgba(244,232,207,.08);

input:focus{border-color:var(--dorado)}

.chip .x{opacity:.7;font-weight:700}

.team .dot{width:16px;height:16px;border-radius:5px;flex-shrink:0}
.team input.nom{font-family:var(--fd);font-size:22px;letter-spacing:1px;background:transparent;border:none;border-bottom:2px solid rgba(244,232,207,.2);border-radius:0;padding:4px 2px}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{flex:1;min-width:64px;padding:12px 6px;font-family:var(--fd);font-size:21px;border:2px solid rgba(244,232,207,.25);

.catrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid rgba(244,232,207,.18);

.catrow.on{border-color:var(--dorado)}
.box{width:26px;height:26px;border:2px solid rgba(244,232,207,.4);border-radius:7px;display:flex;

.flash.no{background:var(--naranja)}

/* ===== utilidades ===== */
const shuffle = (arr) => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const fmtTime = (s) => Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
const COLORES = ["#c0203a","#5b8fa8","#2faf5e","#e8b84b","#9b6bd1","#e8762b"];

/* ===== audio (WebAudio, sin assets) ===== */
const Audio = (() => {
  let ctx = null;
  const get = () => {
    if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
    if (ctx && ctx.state === "suspended") ctx.resume();
    return ctx;
  };
  const tone = (freq, dur, type="sine", vol=0.18, when=0) => {
    const c = get(); if (!c) return;
    const t0 = c.currentTime + when;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.start(t0); o.stop(t0 + dur + 0.02);
  };
  return {
    unlock: get,
    tic:    () => tone(1100, 0.05, "square", 0.06),
    acierto:() => { tone(660,0.12,"triangle",0.2,0); tone(880,0.12,"triangle",0.2,0.1); tone(1175,0.22,"triangle",0.2,0.2); },
    pasar:  () => { tone(300,0.18,"sawtooth",0.14,0); },
    fin:    () => { tone(200,0.5,"sawtooth",0.22,0); tone(150,0.6,"sawtooth",0.22,0.12); },
    win:    () => { [523,659,784,1046].forEach((f,i)=>tone(f,0.3,"triangle",0.2,i*0.14)); },
  };
})();
const vibrar = (p) => { try { navigator.vibrate && navigator.vibrate(p); } catch(e){} };

/* =========================================================================
   APP
   ========================================================================= */
function App(){
  // pantallas: inicio, modo, equipos, ajustes, turno, contando, jugando, resumen, tablero, ganador
  const [scr, setScr] = useState("inicio");
  const [modo, setModo] = useState("clasica"); // clasica | frente
  const [equipos, setEquipos] = useState([
    { nombre:"Los Pochocleros", color:COLORES[0], pts:0, jugs:[] },
    { nombre:"Banda del Sillón", color:COLORES[1], pts:0, jugs:[] },
  ]);
  const [cats, setCats] = useState({ clasicos:true, sagas:true, argentino:true, culto:true, picante:false });
  const [duracion, setDuracion] = useState(90);
  const [rondasTot, setRondasTot] = useState(3);
  const [penalidad, setPenalidad] = useState(false);
  const [pistasOn, setPistasOn] = useState(true);

  // estado de partida
  const [mazo, setMazo] = useState([]);
  const idxMazo = useRef(0);
  const [equipoActual, setEquipoActual] = useState(0);
  const [ronda, setRonda] = useState(1);
  const [tiempo, setTiempo] = useState(90);
  const [corriendo, setCorriendo] = useState(false);
  const [peli, setPeli] = useState(null);
  const [turno, setTurno] = useState({ aciertos:0, salteos:0, lista:[] });
  const [pistaUsada, setPistaUsada] = useState(0);
  const [flash, setFlash] = useState(null); // {tipo:'ok'|'no', titulo}
  const [muerte, setMuerte] = useState(null); // {empatados:[idx], cola:[idx]}
  const [tiltInfo, setTiltInfo] = useState({ ok:false, activo:false });
  const [countdown, setCountdown] = useState(0);

  // estadísticas acumuladas (la simpática del final)
  const stats = useRef({}); // por equipo: {aciertos, salteos, pistas}

  const flashTimer = useRef(null);

  /* ---------- mazo ---------- */
  const construirMazo = useCallback(() => {
    let pool = [];
    CATS.forEach(c => { if (cats[c.id]) BANCO[c.id].forEach(t => pool.push({ titulo:t, cat:c.id })); });
    if (pool.length === 0) { // por las dudas, nunca quedar sin pelis
      BANCO.clasicos.forEach(t => pool.push({ titulo:t, cat:"clasicos" }));
    }
    const m = shuffle(pool);
    idxMazo.current = 0;
    setMazo(m);
    return m;
  }, [cats]);

  const proxima = useCallback((m) => {
    const arr = m || mazo;
    if (!arr.length) return null;
    if (idxMazo.current >= arr.length) { // reusar barajando de nuevo
      const re = shuffle(arr);
      idxMazo.current = 0;
      setMazo(re);
      const p = re[0]; idxMazo.current = 1; setPeli(p); return p;
    }
    const p = arr[idxMazo.current]; idxMazo.current += 1; setPeli(p); return p;
  }, [mazo]);

  /* ---------- cronómetro ---------- */
  useEffect(() => {
    if (!corriendo) return;
    const id = setInterval(() => {
      setTiempo(prev => {
        if (prev <= 1) { clearInterval(id); finTurno(); return 0; }
        if (prev <= 11) Audio.tic();
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  // eslint-disable-next-line
  }, [corriendo]);

  /* ---------- giroscopio (modo frente) ---------- */
  const tilt = useRef({ base:null, armado:true, escuchando:false, handler:null, gotEvent:false });

  const empezarTilt = useCallback(() => {
    const t = tilt.current;
    t.base = null; t.armado = true; t.gotEvent = false;
    const UMBRAL = 42, REARME = 22;
    const handler = (e) => {
      if (e.beta == null) return;
      t.gotEvent = true;
      setTiltInfo(s => s.activo ? s : { ...s, activo:true });
      if (t.base === null) { t.base = e.beta; return; }
      const delta = e.beta - t.base;
      if (t.armado) {
        if (delta < -UMBRAL) { t.armado = false; resolverGesto(true); }
        else if (delta > UMBRAL) { t.armado = false; resolverGesto(false); }
      } else {
        if (Math.abs(delta) < REARME) t.armado = true;
      }
    };
    t.handler = handler;
    window.addEventListener("deviceorientation", handler, true);
    t.escuchando = true;
    // si en 1.2s no llegó ningún evento, avisamos que se usan los botones
    setTimeout(() => { if (!tilt.current.gotEvent) setTiltInfo(s => ({ ...s, activo:false })); }, 1200);
  }, []);

  const pararTilt = useCallback(() => {
    const t = tilt.current;
    if (t.escuchando && t.handler) window.removeEventListener("deviceorientation", t.handler, true);
    t.escuchando = false;
  }, []);

  const pedirPermisoSensor = useCallback(async () => {
    // iOS 13+ requiere permiso explícito desde un gesto del usuario
    try {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        const res = await DeviceOrientationEvent.requestPermission();
        return res === "granted";
      }
    } catch(e){ return false; }
    return true; // Android / navegadores sin gate de permisos
  }, []);

  /* ---------- flujo de turno ---------- */
  const iniciarPartida = () => {
    Audio.unlock();
    const m = construirMazo();
    stats.current = {};
    setEquipos(es => es.map(e => ({ ...e, pts:0 })));
    setRonda(1); setEquipoActual(0); setMuerte(null);
    irAlTurno(0, m);
  };

  const irAlTurno = (idx, m) => {
    setEquipoActual(idx);
    setTurno({ aciertos:0, salteos:0, lista:[] });
    setPistaUsada(0);
    setTiempo(duracion);
    setCorriendo(false);
    setScr("turno");
  };

  const comenzarCuenta = async () => {
    Audio.unlock();
    if (modo === "frente") {
      const ok = await pedirPermisoSensor();
      setTiltInfo({ ok, activo:false });
    }
    proxima();
    // cuenta regresiva 3..2..1
    setScr("contando");
    setCountdown(3);
  };

  // efecto de la cuenta regresiva
  useEffect(() => {
    if (scr !== "contando") return;
    if (countdown <= 0) {
      if (modo === "frente") empezarTilt();
      setScr("jugando");
      setCorriendo(true);
      return;
    }
    Audio.tic();
    const id = setTimeout(() => setCountdown(c => c - 1), 800);
    return () => clearTimeout(id);
  // eslint-disable-next-line
  }, [scr, countdown]);

  const mostrarFlash = (tipo, titulo) => {
    setFlash({ tipo, titulo });
    if (flashTimer.current) clearTimeout(flashTimer.current);
    flashTimer.current = setTimeout(() => setFlash(null), 750);
  };

  const registrar = (acierto) => {
    if (!peli) return;
    const eq = equipoActual;
    const s = stats.current[eq] || { aciertos:0, salteos:0, pistas:0 };
    if (acierto) {
      const vale = pistaUsada > 0 ? 0 : 1;
      Audio.acierto(); vibrar(60);
      setEquipos(es => es.map((e,i) => i===eq ? { ...e, pts:e.pts + vale } : e));
      setTurno(t => ({ ...t, aciertos:t.aciertos+1, lista:[...t.lista, { titulo:peli.titulo, ok:true, vale }] }));
      s.aciertos += 1;
      mostrarFlash("ok", peli.titulo);
    } else {
      Audio.pasar(); vibrar(25);
      if (penalidad) setEquipos(es => es.map((e,i) => i===eq ? { ...e, pts:Math.max(0, e.pts - 1) } : e));
      setTurno(t => ({ ...t, salteos:t.salteos+1, lista:[...t.lista, { titulo:peli.titulo, ok:false }] }));
      s.salteos += 1;
      mostrarFlash("no", peli.titulo);
    }
    stats.current[eq] = s;
    setPistaUsada(0);
    proxima();
  };

  // gesto del giroscopio -> debe correr aunque cambien estados (usa refs vía closures)
  const resolverGesto = (acierto) => {
    if (!corrRef.current) return;
    vibrar(acierto ? 60 : 25);
    registrarRef.current(acierto);
  };
  // refs para que el handler de orientación vea valores actuales
  const corrRef = useRef(false);
  const registrarRef = useRef(registrar);
  useEffect(() => { corrRef.current = corriendo; }, [corriendo]);
  useEffect(() => { registrarRef.current = registrar; });

  const usarPista = () => {
    if (!pistasOn || !peli) return;
    setPistaUsada(p => p + 1);
    const eq = equipoActual;
    const s = stats.current[eq] || { aciertos:0, salteos:0, pistas:0 };
    s.pistas += 1; stats.current[eq] = s;
  };

  const finTurno = () => {
    setCorriendo(false);
    pararTilt();
    Audio.fin(); vibrar([120,60,120]);
    setFlash(null);
    setScr("resumen");
  };

  const cerrarTurno = () => {
    // ¿muerte súbita en curso?
    if (muerte) { avanzarMuerte(); return; }
    const ultimo = equipoActual === equipos.length - 1;
    if (!ultimo) { irAlTurno(equipoActual + 1); return; }
    // terminó la ronda
    if (ronda >= rondasTot) {
      const empatados = liderazgo();
      if (empatados.length > 1) { iniciarMuerte(empatados); }
      else { setScr("ganador"); Audio.win(); vibrar([100,50,100,50,200]); }
    } else {
      setScr("tablero");
    }
  };

  const siguienteRonda = () => { setRonda(r => r + 1); irAlTurno(0); };

  const liderazgo = () => {
    const max = Math.max(...equipos.map(e => e.pts));
    return equipos.map((e,i)=>({e,i})).filter(o => o.e.pts === max).map(o => o.i);
  };

  /* ---------- muerte súbita ---------- */
  const iniciarMuerte = (empatados) => {
    setMuerte({ empatados, cola:empatados.slice(), puntos:{} });
    const primero = empatados[0];
    arrancarTurnoMuerte(primero, empatados);
  };
  const arrancarTurnoMuerte = (idx, empatados) => {
    setEquipoActual(idx);
    setTurno({ aciertos:0, salteos:0, lista:[] });
    setPistaUsada(0);
    setTiempo(30); // muerte súbita: 30s a todo o nada
    setCorriendo(false);
    setScr("turno");
  };
  const avanzarMuerte = () => {
    setMuerte(prev => {
      const m = { ...prev, puntos:{ ...prev.puntos, [equipoActual]:turno.aciertos } };
      const cola = m.cola.slice(1);
      if (cola.length > 0) {
        m.cola = cola;
        setTimeout(() => arrancarTurnoMuerte(cola[0], m.empatados), 0);
        return m;
      }
      // todos jugaron: resolver
      const max = Math.max(...m.empatados.map(i => m.puntos[i] ?? 0));
      const ganan = m.empatados.filter(i => (m.puntos[i] ?? 0) === max);
      if (ganan.length === 1) {
        // sumar el desempate al marcador real para que se note quién ganó
        setEquipos(es => es.map((e,i)=> i===ganan[0] ? { ...e, pts:e.pts + 0.5 } : e));
        setTimeout(() => { setScr("ganador"); Audio.win(); vibrar([100,50,100,50,200]); }, 0);
        return null;
      }
      // sigue empate: otra vuelta entre los que empataron
      setTimeout(() => iniciarMuerte(ganan), 0);
      return null;
    });
  };

  /* ---------- equipos: helpers ---------- */
  const addEquipo = () => setEquipos(es => es.length >= 6 ? es : [...es, {
    nombre:`Equipo ${es.length+1}`, color:COLORES[es.length % COLORES.length], pts:0, jugs:[]
  }]);
  const delEquipo = (i) => setEquipos(es => es.length <= 2 ? es : es.filter((_,k)=>k!==i));
  const renEquipo = (i, v) => setEquipos(es => es.map((e,k)=>k===i?{...e,nombre:v}:e));
  const addJug = (i, n) => setEquipos(es => es.map((e,k)=>k===i?{...e,jugs:[...e.jugs,n]}:e));
  const delJug = (i, j) => setEquipos(es => es.map((e,k)=>k===i?{...e,jugs:e.jugs.filter((_,x)=>x!==j)}:e));

  const algunaCat = Object.values(cats).some(Boolean);

  /* =====================================================================
     RENDER
     ===================================================================== */
  const Header = ({sub}) => (
    <div className="head">
      <div className="claqueta"></div>
      <div className="exp">FUNCIÓN ARGENTA</div>
      <h1>DÍGALO CON <span className="b">MÍMICA</span></h1>
      {sub && <div className="sub">{sub}</div>}
    </div>
  );

  // ----- INICIO -----
  if (scr === "inicio") {
    return (
      <div>
        <Header sub="Pelis para treintañeros" />
        <p className="intro">Actuás una película sin hablar ni hacer ruido y tu equipo adivina contra reloj.
          Dale, en menos de 30 segundos están jugando.</p>
        <div className="col">
          <button className="btn rojo" onClick={()=>{Audio.unlock(); setScr("modo");}}>▸ EMPEZAR A JUGAR</button>
          <button className="btn sec" onClick={()=>setScr("ajustes")}>⚙ Ajustes y categorías</button>
        </div>
        <p className="banner">🍿 Sin registro, sin tutorial. El estado vive en el celu.</p>
      </div>
    );
  }

  // ----- MODO -----
  if (scr === "modo") {
    return (
      <div>
        <Header sub="¿Cómo jugamos?" />
        <div className="col">
          <div className={"card "+(modo==="clasica"?"on":"")} onClick={()=>setModo("clasica")}>
            <div className="emoji">📱</div>
            <div className="t">Pasá el celu</div>
            <div className="d">El que actúa ve la peli en pantalla y la hace sin hablar. El equipo adivina y aprieta «¡Adivinaron!».</div>
          </div>
          <div className={"card "+(modo==="frente"?"on":"")} onClick={()=>setModo("frente")}>
            <div className="emoji">🙇</div>
            <div className="t">En la frente <span style={{fontSize:13,color:"var(--suave)"}}>(estilo Heads Up)</span></div>
            <div className="d">Te apoyás el celu en la frente y el grupo te hace la mímica. Inclinás <b>abajo</b> = acierto, <b>arriba</b> = pasar. Si no hay sensores, hay botones.</div>
          </div>
        </div>
        <div className="col" style={{marginTop:22}}>
          <button className="btn rojo" onClick={()=>setScr("equipos")}>SEGUIR ▸</button>
          <button className="btn sec" onClick={()=>setScr("inicio")}>← Volver</button>
        </div>
      </div>
    );
  }

  // ----- EQUIPOS -----
  if (scr === "equipos") {
    return (
      <div>
        <Header sub="Armá los equipos" />
        {equipos.map((e,i)=>(
          <div className="team" key={i}>
            <div className="top">
              <div className="dot" style={{background:e.color}}></div>
              <input className="nom" value={e.nombre} maxLength={22}
                     onChange={ev=>renEquipo(i,ev.target.value)} placeholder="Nombre del equipo"/>
              {equipos.length>2 && <button className="link" onClick={()=>delEquipo(i)}>borrar</button>}
            </div>
            <JugadorInput onAdd={(n)=>addJug(i,n)} />
            <div className="chips">
              {e.jugs.map((j,k)=>(
                <span className="chip" key={k} style={{background:e.color+"33",border:"1.5px solid "+e.color}}
                      onClick={()=>delJug(i,k)}>{j} <span className="x">✕</span></span>
              ))}
            </div>
          </div>
        ))}
        {equipos.length<6 && <button className="btn sec" onClick={addEquipo}>＋ Sumar equipo</button>}
        <div className="col" style={{marginTop:20}}>
          <button className="btn rojo" onClick={()=>setScr("ajustes")}>SEGUIR ▸</button>
          <button className="btn sec" onClick={()=>setScr("modo")}>← Volver</button>
        </div>
        <p className="banner">Los jugadores son opcionales, pero ayudan para las estadísticas del final.</p>
      </div>
    );
  }

  // ----- AJUSTES -----
  if (scr === "ajustes") {
    return (
      <div>
        <Header sub="Categorías y reglas" />
        <label>¿Qué pelis entran?</label>
        {CATS.map(c=>(
          <div key={c.id} className={"catrow "+(cats[c.id]?"on":"")} onClick={()=>setCats(s=>({...s,[c.id]:!s[c.id]}))}>
            <div className={"box "+(cats[c.id]?"on":"")}>{cats[c.id]?"✓":""}</div>
            <div className="info">
              <div className="ct">{c.emoji} {c.nombre}</div>
              <div className="cd">{c.desc} · {BANCO[c.id].length} títulos</div>
            </div>
          </div>
        ))}
        {!algunaCat && <p className="muted center">Elegí al menos una categoría 🎬</p>}

        <label>Duración del turno</label>
        <div className="opts">
          {[60,90,120].map(d=>(
            <button key={d} className={"opt "+(duracion===d?"on":"")} onClick={()=>{setDuracion(d); setTiempo(d);}}>{d}s</button>
          ))}
        </div>

        <label>Rondas</label>
        <div className="opts">
          {[1,2,3,4,5].map(r=>(
            <button key={r} className={"opt "+(rondasTot===r?"on":"")} onClick={()=>setRondasTot(r)}>{r}</button>
          ))}
        </div>

        <label>Extras</label>
        <div className="switch" onClick={()=>setPistasOn(v=>!v)}>
          <span className="lbl">💡 Pistas canjeables (esa peli vale 0 puntos)</span>
          <div className={"toggle "+(pistasOn?"on":"")}><div className="knob"></div></div>
        </div>
        <div className="switch" onClick={()=>setPenalidad(v=>!v)}>
          <span className="lbl">⛔ Saltear resta 1 punto</span>
          <div className={"toggle "+(penalidad?"on":"")}><div className="knob"></div></div>
        </div>

        <div className="col" style={{marginTop:22}}>
          <button className="btn rojo" disabled={!algunaCat || equipos.length<2}
                  onClick={()=>{ iniciarPartida(); }}>¡A JUGAR! ▸</button>
          <button className="btn sec" onClick={()=>setScr(equipos.length>=2?"equipos":"inicio")}>← Volver</button>
        </div>
      </div>
    );
  }

  // ----- TURNO (intro) -----
  if (scr === "turno") {
    const eq = equipos[equipoActual];
    return (
      <div>
        <Header sub={muerte ? "MUERTE SÚBITA" : `Ronda ${ronda} de ${rondasTot}`} />
        <div className="center" style={{marginTop:10}}>
          <span className="tag" style={{borderColor:eq.color, color:eq.color}}>Le toca a</span>
          <h2 style={{color:eq.color, fontSize:42, margin:"14px 0 6px"}}>{eq.nombre}</h2>
          <p className="intro" style={{marginTop:6}}>
            {modo==="clasica"
              ? "Que un jugador agarre el celu y actúe lo que aparezca. ¡Sin hablar ni hacer ruidos!"
              : "Apoyate el celu en la frente con la pantalla hacia el grupo. Ellos te hacen la mímica."}
          </p>
          {muerte && <p className="muted">Desempate a {tiempo}s. El que más adivina, gana.</p>}
        </div>
        <div className="col" style={{marginTop:24}}>
          <button className="btn verde" onClick={comenzarCuenta}>EMPEZAR ▸</button>
        </div>
        {modo==="frente" &&
          <p className="banner">📲 Si el celu no tiene sensores o no das permiso, aparecen botones grandes en pantalla.</p>}
      </div>
    );
  }

  // ----- CONTANDO (3,2,1) -----
  if (scr === "contando") {
    const eq = equipos[equipoActual];
    return (
      <div className="center" style={{paddingTop:"22vh"}}>
        <span className="tag" style={{borderColor:eq.color, color:eq.color}}>{eq.nombre}</span>
        <div className="countdown">{countdown}</div>
        <p className="muted">{modo==="frente" ? "Celu en la frente…" : "¡Preparate!"}</p>
      </div>
    );
  }

  // ----- JUGANDO -----
  if (scr === "jugando") {
    const eq = equipos[equipoActual];
    const meta = peli ? META[peli.titulo] : null;
    const catInfo = peli ? CATS.find(c=>c.id===peli.cat) : null;

    if (modo === "frente") {
      const usaBotones = !tiltInfo.ok || !tiltInfo.activo;
      return (
        <div className="frente-play">
          {flash && (
            <div className={"flash "+(flash.tipo==="ok"?"ok":"no")}>
              <div className="big">{flash.tipo==="ok"?"¡ACERTARON!":"PASAMOS"}</div>
              <div className="pl">{flash.titulo}</div>
            </div>
          )}
          <div className="tt">{fmtTime(tiempo)}</div>
          {peli && <p className="peli frente">{peli.titulo}</p>}
          {usaBotones ? (
            <div className="fb-row">
              <button className="btn naranja" style={{flex:1}} onClick={()=>registrar(false)}>PASAR ↑</button>
              <button className="btn verde" style={{flex:1}} onClick={()=>registrar(true)}>ACERTÓ ↓</button>
            </div>
          ) : (
            <p className="hint">Incliná el celu hacia <b>abajo</b> = acertaron · hacia <b>arriba</b> = pasar.<br/>Volvé al centro entre cada peli.</p>
          )}
          <button className="link" style={{position:"absolute",bottom:8,color:"rgba(244,232,207,.4)"}}
                  onClick={finTurno}>terminar turno</button>
        </div>
      );
    }

    // modo clásico
    return (
      <div>
        {flash && (
          <div className={"flash "+(flash.tipo==="ok"?"ok":"no")}>
            <div className="big">{flash.tipo==="ok"?"¡BIEN AHÍ!":"SIGUIENTE"}</div>
            <div className="pl">{flash.titulo}</div>
          </div>
        )}
        <div className="center" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span className="tag" style={{borderColor:eq.color,color:eq.color}}>{eq.nombre}</span>
          <span className="muted">✓ {turno.aciertos} · ⤳ {turno.salteos}</span>
        </div>
        <div className={"timer "+(tiempo<=10?"urgente":"")}>{fmtTime(tiempo)}</div>
        <div className="card" style={{cursor:"default",minHeight:170,display:"flex",flexDirection:"column",justifyContent:"center"}}>
          {catInfo && <span className="tag" style={{marginBottom:10}}>{catInfo.emoji} {catInfo.nombre}</span>}
          {peli && <p className="peli">{peli.titulo}</p>}
          {pistaUsada>0 && (
            <div className="pista-box" style={{textAlign:"left"}}>
              {pistaUsada>=1 && <div>🎞️ <b>Género:</b> {(meta&&meta.g)||catInfo.genero}</div>}
              {pistaUsada>=2 && <div>🔤 <b>Empieza con:</b> «{peli.titulo[0].toUpperCase()}» · {peli.titulo.split(" ").length} palabra(s)</div>}
              {pistaUsada>=3 && meta && meta.a && <div>📅 <b>Año:</b> {meta.a}</div>}
              {pistaUsada>=3 && meta && meta.p && <div>⭐ <b>Protagónico:</b> {meta.p}</div>}
              {pistaUsada>=3 && !meta && <div className="muted">No hay más datos de esta peli. ¡A puro gesto!</div>}
            </div>
          )}
        </div>
        {pistasOn && (
          <div className="center" style={{margin:"10px 0"}}>
            <button className="link" onClick={usarPista}>💡 Pedir pista (esta peli pasa a valer 0)</button>
          </div>
        )}
        <div className="row" style={{marginTop:6}}>
          <button className="btn naranja" style={{flex:1}} onClick={()=>registrar(false)}>SALTEAR</button>
          <button className="btn verde" style={{flex:2}} onClick={()=>registrar(true)}>¡ADIVINARON!</button>
        </div>
        <div className="foot"><button className="link" onClick={finTurno}>terminar turno antes de tiempo</button></div>
      </div>
    );
  }

  // ----- RESUMEN DE TURNO -----
  if (scr === "resumen") {
    const eq = equipos[equipoActual];
    const sumados = turno.lista.filter(x=>x.ok).reduce((a,x)=>a+(x.vale??1),0);
    let labelBtn = "SIGUIENTE EQUIPO ▸";
    if (muerte) labelBtn = muerte.cola.length>1 ? "SIGUE EL DESEMPATE ▸" : "VER GANADOR ▸";
    else if (equipoActual===equipos.length-1) labelBtn = ronda>=rondasTot ? "DEFINIR ▸" : "FIN DE RONDA · TABLERO ▸";
    return (
      <div>
        <Header sub={muerte ? "MUERTE SÚBITA" : "¡Se acabó el tiempo!"} />
        <div className="center">
          <h2 style={{color:eq.color}}>{eq.nombre}</h2>
          <div className="bignum" style={{color:"var(--dorado)"}}>{turno.aciertos}</div>
          <p className="muted">acierto(s){sumados!==turno.aciertos?` · +${sumados} pts (algunas con pista)`:""} · {turno.salteos} salteada(s)</p>
        </div>
        <div className="lista">
          {turno.lista.length===0 && <p className="muted center">No marcaron ninguna. ¡La próxima!</p>}
          {turno.lista.map((x,i)=>(
            <div key={i} className={"it "+(x.ok?"ok":"no")}>
              <span>{x.titulo}</span>
              <span className="e">{x.ok ? (x.vale===0?"✓ (pista)":"✓ +1") : "saltó"}</span>
            </div>
          ))}
        </div>
        <button className="btn rojo" onClick={cerrarTurno}>{labelBtn}</button>
      </div>
    );
  }

  // ----- TABLERO ENTRE RONDAS -----
  if (scr === "tablero") {
    const orden = equipos.map((e,i)=>({e,i})).sort((a,b)=>b.e.pts-a.e.pts);
    const max = orden[0].e.pts;
    return (
      <div>
        <Header sub={`Terminó la ronda ${ronda}`} />
        <h2 className="center">🏆 Tablero</h2>
        {orden.map(({e,i})=>(
          <div key={i} className={"score-line "+(e.pts===max&&max>0?"lider":"")}>
            <span className="nm"><span className="dot" style={{width:16,height:16,borderRadius:5,background:e.color,display:"inline-block"}}></span>{e.nombre}</span>
            <span className="pts">{e.pts}</span>
          </div>
        ))}
        <div className="col" style={{marginTop:20}}>
          <button className="btn rojo" onClick={siguienteRonda}>RONDA {ronda+1} ▸</button>
          <button className="btn sec" onClick={()=>setScr("ajustes")}>⚙ Cambiar ajustes</button>
        </div>
      </div>
    );
  }

  // ----- GANADOR -----
  if (scr === "ganador") {
    const orden = equipos.map((e,i)=>({e,i})).sort((a,b)=>b.e.pts-a.e.pts);
    const campeon = orden[0];
    // estadística simpática
    let masExpresivo = null, masSalteador = null, maxA=-1, maxS=-1;
    Object.entries(stats.current).forEach(([k,v])=>{
      if (v.aciertos>maxA){maxA=v.aciertos; masExpresivo=+k;}
      if (v.salteos>maxS){maxS=v.salteos; masSalteador=+k;}
    });
    return (
      <div>
        <Header sub="¡Caso cerrado!" />
        <div className="center">
          <div style={{fontSize:64}}>🏆</div>
          <h2 style={{color:campeon.e.color, fontSize:46, margin:"4px 0 2px"}}>{campeon.e.nombre}</h2>
          <p className="sub">¡GANADOR!</p>
        </div>
        <div style={{margin:"16px 0"}}>
          {orden.map(({e,i})=>(
            <div key={i} className={"score-line "+(i===campeon.i?"lider":"")}>
              <span className="nm"><span className="dot" style={{width:16,height:16,borderRadius:5,background:e.color,display:"inline-block"}}></span>{e.nombre}</span>
              <span className="pts">{Number.isInteger(e.pts)?e.pts:Math.floor(e.pts)}</span>
            </div>
          ))}
        </div>
        {(masExpresivo!==null) && (
          <div>
            <label>De yapa</label>
            {maxA>0 && <div className="stat"><span>🎭 El más expresivo</span><span className="v">{equipos[masExpresivo].nombre}</span></div>}
            {maxS>0 && <div className="stat"><span>🙈 El que más salteó</span><span className="v">{equipos[masSalteador].nombre}</span></div>}
          </div>
        )}
        <div className="col" style={{marginTop:20}}>
          <button className="btn rojo" onClick={iniciarPartida}>↻ REVANCHA (mismos equipos)</button>
          <button className="btn sec" onClick={()=>setScr("inicio")}>🏠 Volver al inicio</button>
        </div>
      </div>
    );
  }

  return null;
}

/* input de jugador con su propio estado para no re-renderizar todo */
function JugadorInput({ onAdd }){
  const [v, setV] = useState("");
  const add = () => { const n=v.trim(); if(n){ onAdd(n); setV(""); } };
  return (
    <div className="row">
      <input value={v} placeholder="Sumar jugador (opcional)…" enterKeyHint="done"
             onChange={e=>setV(e.target.value)}
             onKeyDown={e=>{ if(e.key==="Enter") add(); }} />
      <button className="btn mini" onClick={add}>＋</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
