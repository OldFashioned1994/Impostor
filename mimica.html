@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
:root{
  --noche:#140a10; --noche2:#1f0f17; --butaca:#9c1b2e; --butaca2:#c0203a;
  --dorado:#e8b84b; --dorado2:#f6d27a; --crema:#f4e8cf; --suave:#b79d8a;
  --verde:#2faf5e; --verde2:#1d7d42; --naranja:#e8762b; --naranja2:#c25a18;
  --fd:'Bebas Neue','Arial Narrow',sans-serif; --fb:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(232,184,75,.10), transparent 60%),
    radial-gradient(140% 100% at 50% 120%, rgba(156,27,46,.30), transparent 55%),
    var(--noche);
  color:var(--crema); font-family:var(--fb);
  user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  padding:max(18px, env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
  display:flex; justify-content:center; overflow-x:hidden;
}
#app{width:100%;max-width:440px}
.claqueta{height:14px;background:repeating-linear-gradient(115deg,#111 0 18px,var(--crema) 18px 36px);
  border-radius:3px;margin-bottom:14px;opacity:.9}
.head{text-align:center;margin-bottom:18px}
.exp{font-family:var(--fd);font-size:15px;letter-spacing:6px;color:var(--dorado)}
h1{font-family:var(--fd);font-size:54px;margin:2px 0 4px;letter-spacing:2px;line-height:.95;
  color:var(--crema);text-shadow:3px 3px 0 var(--butaca)}
h1 .b{color:var(--dorado)}
h2{font-family:var(--fd);font-size:34px;margin:6px 0 14px;letter-spacing:1px;line-height:1}
.sub{font-family:var(--fd);font-size:18px;letter-spacing:3px;color:var(--dorado);text-transform:uppercase}
.intro{font-size:14.5px;color:var(--suave);text-align:center;line-height:1.5;margin:0 auto 20px;max-width:360px}
.btn{font-family:var(--fd);font-size:23px;padding:15px 20px;width:100%;border:none;
  border-radius:12px;cursor:pointer;letter-spacing:1.5px;color:#1a0d12;
  background:linear-gradient(180deg,var(--dorado2),var(--dorado));
  box-shadow:0 5px 0 #9c7a23, 0 8px 18px rgba(0,0,0,.4);transition:transform .06s, box-shadow .06s}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #9c7a23}
.btn:disabled{opacity:.4;box-shadow:none;transform:none}
.btn.rojo{background:linear-gradient(180deg,var(--butaca2),var(--butaca));color:var(--crema);box-shadow:0 5px 0 #6f0f1d,0 8px 18px rgba(0,0,0,.4)}
.btn.rojo:active{box-shadow:0 1px 0 #6f0f1d}
.btn.sec{background:transparent;color:var(--crema);border:2px solid rgba(244,232,207,.4);box-shadow:none;font-size:19px}
.btn.sec:active{transform:translateY(2px);background:rgba(244,232,207,.06)}
.btn.verde{background:linear-gradient(180deg,var(--verde),var(--verde2));color:#fff;box-shadow:0 5px 0 #14592f,0 8px 18px rgba(0,0,0,.4)}
.btn.verde:active{box-shadow:0 1px 0 #14592f}
.btn.naranja{background:linear-gradient(180deg,var(--naranja),var(--naranja2));color:#fff;box-shadow:0 5px 0 #8c3e0f,0 8px 18px rgba(0,0,0,.4)}
.btn.naranja:active{box-shadow:0 1px 0 #8c3e0f}
.btn.mini{width:auto;padding:12px 16px;font-size:20px;flex:0 0 auto}
.row{display:flex;gap:10px}
.col{display:flex;flex-direction:column;gap:12px}
.card{background:linear-gradient(180deg,var(--noche2),rgba(31,15,23,.5));border:2px solid rgba(232,184,75,.25);
  border-radius:16px;padding:20px;cursor:pointer;transition:transform .08s, border-color .15s;text-align:center}
.card:active{transform:scale(.98)}
.card.on{border-color:var(--dorado);box-shadow:0 0 0 2px rgba(232,184,75,.3)}
.card .emoji{font-size:40px}
.card .t{font-family:var(--fd);font-size:26px;letter-spacing:1px;margin:6px 0 2px}
.card .d{font-size:13px;color:var(--suave);line-height:1.4}
label{font-family:var(--fd);font-size:16px;letter-spacing:3px;color:var(--dorado);display:block;margin:18px 0 8px}
input{flex:1;padding:13px 14px;font-size:16px;font-family:var(--fb);background:rgba(244,232,207,.08);
  border:2px solid rgba(244,232,207,.25);border-radius:10px;color:var(--crema);outline:none;min-width:0}
input:focus{border-color:var(--dorado)}
input::placeholder{color:var(--suave)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;min-height:8px}
.chip{font-family:var(--fb);font-weight:600;font-size:14px;padding:7px 12px;border-radius:999px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px}
.chip .x{opacity:.7;font-weight:700}
.team{border:2px solid rgba(244,232,207,.2);border-radius:14px;padding:14px;margin-bottom:12px;background:rgba(31,15,23,.4)}
.team .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.team .dot{width:16px;height:16px;border-radius:5px;flex-shrink:0}
.team input.nom{font-family:var(--fd);font-size:22px;letter-spacing:1px;background:transparent;border:none;border-bottom:2px solid rgba(244,232,207,.2);border-radius:0;padding:4px 2px}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{flex:1;min-width:64px;padding:12px 6px;font-family:var(--fd);font-size:21px;border:2px solid rgba(244,232,207,.25);
  border-radius:10px;cursor:pointer;background:transparent;color:var(--crema);text-align:center;letter-spacing:1px}
.opt.on{background:var(--dorado);color:#1a0d12;border-color:var(--dorado)}
.catrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid rgba(244,232,207,.18);
  border-radius:12px;margin-bottom:10px;cursor:pointer;background:rgba(31,15,23,.4)}
.catrow.on{border-color:var(--dorado)}
.box{width:26px;height:26px;border:2px solid rgba(244,232,207,.4);border-radius:7px;display:flex;
  align-items:center;justify-content:center;font-size:17px;flex-shrink:0;color:#1a0d12;font-weight:700}
.box.on{background:var(--dorado);border-color:var(--dorado)}
.catrow .info{flex:1}
.catrow .ct{font-family:var(--fd);font-size:20px;letter-spacing:1px}
.catrow .cd{font-size:12px;color:var(--suave)}
.switch{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 4px;cursor:pointer}
.switch .lbl{font-size:14.5px}
.toggle{width:52px;height:30px;border-radius:999px;background:rgba(244,232,207,.2);position:relative;flex-shrink:0;transition:background .15s}
.toggle.on{background:var(--verde)}
.toggle .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s}
.toggle.on .knob{left:25px}
.timer{font-family:var(--fd);font-size:96px;letter-spacing:4px;line-height:1;margin:6px 0;text-align:center}
.timer.urgente,.tt.urgente{color:var(--butaca2);animation:pulse .5s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.06)}}
.peli{font-family:var(--fd);font-size:46px;line-height:1.02;letter-spacing:1px;text-align:center;margin:0;word-break:break-word}
.peli.frente{font-size:60px}
.tag{display:inline-block;font-family:var(--fd);font-size:14px;letter-spacing:3px;color:var(--dorado);
  border:1.5px solid var(--dorado);border-radius:999px;padding:4px 12px;text-transform:uppercase}
.center{text-align:center}
.muted{color:var(--suave);font-size:13.5px}
.score-line{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px;

.score-line .nm{font-family:var(--fd);font-size:24px;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.score-line .pts{font-family:var(--fd);font-size:30px;color:var(--dorado)}
.score-line.lider{border-color:var(--dorado);background:rgba(232,184,75,.1)}
.lista{margin:10px 0;max-height:36vh;overflow:auto}
.lista .it{display:flex;justify-content:space-between;gap:8px;padding:9px 12px;border-radius:9px;font-size:15px;margin-bottom:6px}
.lista .it.ok{background:rgba(47,175,94,.16)}
.lista .it.no{background:rgba(232,118,43,.14)}
.lista .it .e{font-weight:700;white-space:nowrap}
.bignum{font-family:var(--fd);font-size:120px;line-height:1;text-align:center;color:var(--dorado)}
.dot-inline{width:16px;height:16px;border-radius:5px;display:inline-block}
.flash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;

.flash.ok{background:var(--verde)}
.flash.no{background:var(--naranja)}
.flash .big{font-family:var(--fd);font-size:74px;letter-spacing:2px}
.flash .pl{font-family:var(--fd);font-size:30px;opacity:.92;margin-top:8px;line-height:1.05}
.frente-play{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:40;padding:24px;background:var(--noche)}
.frente-play .tt{position:absolute;top:max(20px,env(safe-area-inset-top));font-family:var(--fd);font-size:60px;color:var(--dorado)}
.frente-play .hint{position:absolute;bottom:calc(58px + env(safe-area-inset-bottom));font-size:13px;color:var(--suave);text-align:center;width:90%;line-height:1.5}
.frente-acts{position:absolute;bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center;width:92%}
.frente-acts .link{color:rgba(244,232,207,.62)}
.fb-row{display:flex;gap:14px;width:100%;max-width:380px;margin-top:30px}
.pista-box{background:rgba(232,184,75,.1);border:1.5px dashed var(--dorado);border-radius:12px;padding:12px 14px;
  margin:14px 0;font-size:14.5px;line-height:1.6;text-align:left}
.pista-box b{color:var(--dorado)}
.foot{margin-top:18px;text-align:center}
.link{color:var(--suave);font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:var(--fb);padding:6px}
.banner{font-size:13px;color:var(--suave);text-align:center;margin-top:14px;line-height:1.4}
.stat{display:flex;justify-content:space-between;padding:10px 14px;border-radius:10px;background:rgba(31,15,23,.5);
  margin-bottom:8px;font-size:15px;align-items:center}
.stat .v{font-family:var(--fd);font-size:20px;color:var(--dorado)}
.countdown{font-family:var(--fd);font-size:200px;line-height:1;text-align:center;color:var(--dorado)}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.btn:focus-visible,.link:focus-visible,.opt:focus-visible,.card:focus-visible,.catrow:focus-visible,.switch:focus-visible,.chip:focus-visible,.nom:focus-visible{outline:3px solid var(--dorado2);outline-offset:2px}
.pausa{position:fixed;inset:0;z-index:55;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:rgba(20,10,16,.94);padding:24px;text-align:center}
.pausa .big{font-family:var(--fd);font-size:64px;letter-spacing:3px;color:var(--dorado)}
.pausa .acts{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px}

const COLORES = ["#c0203a","#5b8fa8","#2faf5e","#e8b84b","#9b6bd1","#e8762b"];
const shuffle = (arr) => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
};
const fmtTime = (s) => Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const catDe = (id) => CATS.find(c => c.id === id);

/* ===== audio (WebAudio, sin assets) ===== */
const Audio = (() => {
  let ctx = null;
  const get = () => {
    if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return null; } }
    if (ctx && ctx.state === "suspended") { try { ctx.resume(); } catch(e){} }
    return ctx;
  };
  const tone = (freq, dur, type, vol, when) => {
    const c = get(); if (!c) return;
    const t0 = c.currentTime + (when||0);
    const o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol||0.18, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.start(t0); o.stop(t0 + dur + 0.02);
  };
  return {
    unlock: get,
    tic:    () => tone(1100, 0.05, "square", 0.06, 0),
    acierto:() => { tone(660,0.12,"triangle",0.2,0); tone(880,0.12,"triangle",0.2,0.1); tone(1175,0.22,"triangle",0.2,0.2); },
    pasar:  () => tone(300,0.18,"sawtooth",0.14,0),
    fin:    () => { tone(200,0.5,"sawtooth",0.22,0); tone(150,0.6,"sawtooth",0.22,0.12); },
    win:    () => [523,659,784,1046].forEach((f,i)=>tone(f,0.3,"triangle",0.2,i*0.14))
  };
})();

/* ===== mazo ===== */
function construirMazo(){
  let pool = [];
  CATS.forEach(c => { if (S.cats[c.id]) BANCO[c.id].forEach(t => pool.push({ titulo:t, cat:c.id })); });
  if (pool.length === 0) BANCO.clasicos.forEach(t => pool.push({ titulo:t, cat:"clasicos" }));
  S.mazo = shuffle(pool); S.idx = 0;
}
function proxima(){
  if (!S.mazo.length) return;
  if (S.idx >= S.mazo.length) { S.mazo = shuffle(S.mazo); S.idx = 0; }
  S.peli = S.mazo[S.idx]; S.idx += 1;
}

/* ===== cronómetro ===== */
function pararTimer(){ S.corriendo = false; if (timerId){ clearInterval(timerId); timerId = null; } }
function arrancarTimer(){
  pararTimer(); S.corriendo = true;
  timerId = setInterval(() => {
    S.seg -= 1;
    if (S.seg < 0) S.seg = 0;
    const t = document.getElementById("timer");
    if (t){ t.textContent = fmtTime(S.seg); t.classList.toggle("urgente", S.seg <= 10); }
    const tf = document.getElementById("timerFrente");
    if (tf){ tf.textContent = fmtTime(S.seg); tf.classList.toggle("urgente", S.seg <= 10); }
    if (S.seg === 10){ const a = document.getElementById("srAlert"); if (a) a.textContent = "Quedan 10 segundos"; }
    if (S.seg <= 10 && S.seg > 0) Audio.tic();
    if (S.seg <= 0) { pararTimer(); finTurno(); }
  }, 1000);
}

/* ===== giroscopio (modo frente) ===== */
function empezarTilt(){
  tilt.base = null; tilt.armado = true; tilt.gotEvent = false;
  const UMBRAL = 42, REARME = 22;
  tilt.handler = function(e){
    if (e.beta == null) return;
    tilt.gotEvent = true;
    if (!S.tiltActivo){ S.tiltActivo = true; const h = document.getElementById("frenteFb"); if (h) h.style.display = "none"; const hint = document.getElementById("frenteHint"); if (hint) hint.style.display = "block"; }
    if (tilt.base === null){ tilt.base = e.beta; return; }
    const d = e.beta - tilt.base;
    if (tilt.armado){
      if (d < -UMBRAL){ tilt.armado = false; if (S.corriendo) registrar(true); }
      else if (d > UMBRAL){ tilt.armado = false; if (S.corriendo) registrar(false); }
    } else if (Math.abs(d) < REARME){ tilt.armado = true; }
  };
  window.addEventListener("deviceorientation", tilt.handler, true);
  tilt.escuchando = true;
}
function pararTilt(){
  if (tilt.escuchando && tilt.handler) window.removeEventListener("deviceorientation", tilt.handler, true);
  tilt.escuchando = false;
}
function pedirPermisoSensor(){
  return new Promise((resolve) => {
    try {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission().then(r => resolve(r === "granted")).catch(() => resolve(false));
        return;
      }
    } catch(e){ return resolve(false); }
    resolve(typeof DeviceOrientationEvent !== "undefined"); // Android / sin gate de permiso
  });
}

/* =========================================================================
   FLUJO DE JUEGO
   ========================================================================= */
function iniciarPartida(){
  Audio.unlock();
  construirMazo();
  S.stats = {};
  S.equipos.forEach(e => e.pts = 0);
  S.ronda = 1; S.muerte = null;
  irAlTurno(0);
}
function irAlTurno(idx){
  S.equipoActual = idx;
  S.turno = { aciertos:0, salteos:0, lista:[] };
  S.pistaUsada = 0;
  S.ultimo = null; S.pausado = false;
  S.seg = S.muerte ? 30 : S.duracion;
  pararTimer();
  S.scr = "turno"; render();
}
function comenzarCuenta(){
  Audio.unlock();
  const arrancar = () => {
    proxima();
    S.cuenta = 3; S.scr = "contando"; render();
    tickCuenta();
  };
  if (S.modo === "frente"){
    pedirPermisoSensor().then(ok => { S.tiltOk = ok; S.tiltActivo = false; arrancar(); });
  } else { arrancar(); }
}
function tickCuenta(){
  Audio.tic();
  setTimeout(() => {
    S.cuenta -= 1;
    if (S.cuenta <= 0){
      if (S.modo === "frente") empezarTilt();
      S.scr = "jugando"; render(); arrancarTimer();
    } else { render(); tickCuenta(); }
  }, 800);
}

function mostrarFlash(tipo, titulo){
  const old = document.getElementById("flash"); if (old) old.remove();
  const div = document.createElement("div");
  div.id = "flash";
  div.className = "flash " + (tipo === "ok" ? "ok" : "no");
  const big = tipo === "ok"
    ? (S.modo === "frente" ? "¡ACERTARON!" : "¡BIEN AHÍ!")
    : (S.modo === "frente" ? "PASAMOS" : "SIGUIENTE");
  div.innerHTML = '<div class="big">'+big+'</div><div class="pl">'+esc(titulo)+'</div>';
  document.body.appendChild(div);
  setTimeout(() => { if (div.parentNode) div.remove(); }, 720);
}

function registrar(acierto){
  if (!S.peli || !S.corriendo) return;
  const eq = S.equipoActual;
  const s = S.stats[eq] || { aciertos:0, salteos:0, pistas:0 };
  const titulo = S.peli.titulo;
  const snap = { eq, acierto, peli:S.peli, idx:S.idx, vale:0, penal:0 }; // para deshacer
  if (acierto){
    const vale = S.pistaUsada > 0 ? 0 : 1;
    Audio.acierto(); vibrar(60);
    S.equipos[eq].pts += vale;
    S.turno.aciertos += 1;
    S.turno.lista.push({ titulo, ok:true, vale });
    s.aciertos += 1;
    snap.vale = vale;
    mostrarFlash("ok", titulo);
  } else {
    Audio.pasar(); vibrar(25);
    if (S.penalidad){ const antes = S.equipos[eq].pts; S.equipos[eq].pts = Math.max(0, antes - 1); snap.penal = antes - S.equipos[eq].pts; }
    S.turno.salteos += 1;
    S.turno.lista.push({ titulo, ok:false });
    s.salteos += 1;
    mostrarFlash("no", titulo);
  }
  S.stats[eq] = s;
  S.ultimo = snap;
  S.pistaUsada = 0;
  proxima();
  pintarJugando();
  guardarEstado();
}
function revertirUltimo(){
  const u = S.ultimo;
  if (!u || !S.corriendo) return;
  const eq = u.eq;
  if (u.acierto){ S.equipos[eq].pts -= u.vale; S.turno.aciertos = Math.max(0, S.turno.aciertos - 1); }
  else { S.equipos[eq].pts += u.penal; S.turno.salteos = Math.max(0, S.turno.salteos - 1); }
  const s = S.stats[eq];
  if (s){ if (u.acierto) s.aciertos = Math.max(0, s.aciertos - 1); else s.salteos = Math.max(0, s.salteos - 1); }
  S.turno.lista.pop();
  S.peli = u.peli; S.idx = u.idx;   // vuelve la peli que se habia marcado
  S.ultimo = null;
  vibrar(20);
  pintarJugando(true);
  guardarEstado();
}
function pausarTurno(){
  if (S.pausado || !S.corriendo) return;
  pararTimer(); pararTilt(); S.pausado = true; guardarEstado();
  const old = document.getElementById("pausaOverlay"); if (old) old.remove();
  const div = document.createElement("div");
  div.id = "pausaOverlay"; div.className = "pausa"; div.setAttribute("role", "dialog"); div.setAttribute("aria-label", "Juego en pausa");
  div.innerHTML = '<div class="big">EN PAUSA</div>'+
    '<div class="acts">'+
      '<button class="btn verde" id="pReanudar">▸ REANUDAR</button>'+
      '<button class="btn sec" id="pTerminar">terminar turno</button>'+
    '</div>';
  document.body.appendChild(div);
  document.getElementById("pReanudar").onclick = reanudarTurno;
  document.getElementById("pTerminar").onclick = () => { const d = document.getElementById("pausaOverlay"); if (d) d.remove(); S.pausado = false; finTurno(); };
}
function reanudarTurno(){
  const d = document.getElementById("pausaOverlay"); if (d) d.remove();
  if (!S.pausado) return;
  S.pausado = false;
  if (S.modo === "frente" && S.tiltOk) empezarTilt();
  arrancarTimer();
}
function usarPista(){
  if (!S.pistasOn || !S.peli) return;
  S.pistaUsada += 1;
  const eq = S.equipoActual;
  const s = S.stats[eq] || { aciertos:0, salteos:0, pistas:0 };
  s.pistas += 1; S.stats[eq] = s;
  pintarJugando();
}
function finTurno(){
  pararTimer(); pararTilt();
  Audio.fin(); vibrar([120,60,120]);
  const f = document.getElementById("flash"); if (f) f.remove();
  S.scr = "resumen"; render();
}
function cerrarTurno(){
  if (S.muerte){ avanzarMuerte(); return; }
  const ultimo = S.equipoActual === S.equipos.length - 1;
  if (!ultimo){ irAlTurno(S.equipoActual + 1); return; }
  if (S.ronda >= S.rondasTot){
    const emp = liderazgo();
    if (emp.length > 1) iniciarMuerte(emp);
    else { S.scr = "ganador"; render(); Audio.win(); vibrar([100,50,100,50,200]); }
  } else { S.scr = "tablero"; render(); }
}
function siguienteRonda(){ S.ronda += 1; irAlTurno(0); }
function liderazgo(){
  const max = Math.max.apply(null, S.equipos.map(e => e.pts));
  const out = [];
  S.equipos.forEach((e,i) => { if (e.pts === max) out.push(i); });
  return out;
}

/* ===== muerte súbita ===== */
function iniciarMuerte(empatados){
  S.muerte = { empatados:empatados.slice(), cola:empatados.slice(), puntos:{} };
  irAlTurno(empatados[0]);
}
function avanzarMuerte(){
  const m = S.muerte;
  m.puntos[S.equipoActual] = S.turno.aciertos;
  m.cola = m.cola.slice(1);
  if (m.cola.length > 0){ irAlTurno(m.cola[0]); return; }
  // todos jugaron el desempate
  const max = Math.max.apply(null, m.empatados.map(i => m.puntos[i] || 0));
  const ganan = m.empatados.filter(i => (m.puntos[i] || 0) === max);
  if (ganan.length === 1){
    S.equipos[ganan[0]].pts += 1; // un punto entero: el triunfo se ve en el marcador final
    S.muerte = null;
    S.scr = "ganador"; render(); Audio.win(); vibrar([100,50,100,50,200]);
  } else {
    iniciarMuerte(ganan); // sigue el empate: otra vuelta entre los que empataron
  }
}

/* ===== equipos ===== */
function addEquipo(){
  if (S.equipos.length >= 6) return;
  S.equipos.push({ nombre:"Equipo "+(S.equipos.length+1), color:COLORES[S.equipos.length % COLORES.length], pts:0, jugs:[] });
  render();
}
function delEquipo(i){ if (S.equipos.length <= 2) return; S.equipos.splice(i,1); render(); }

      '<h2 style="color:'+camp.e.color+';font-size:46px;margin:4px 0 2px">'+esc(camp.e.nombre)+'</h2>'+
      '<p class="sub">¡GANADOR!</p></div><div style="margin:16px 0">';
    orden.forEach(o => {
      h += '<div class="score-line '+(o.i===camp.i?"lider":"")+'">'+
        '<span class="nm"><span class="dot-inline" style="background:'+o.e.color+'"></span>'+esc(o.e.nombre)+'</span>'+
        '<span class="pts">'+Math.floor(o.e.pts)+'</span></div>';
    });
    h += '</div>';
    if (masExp !== null && (maxA>0 || maxS>0)){
      h += '<label>De yapa</label>';
      if (maxA>0) h += '<div class="stat"><span>🎭 El más expresivo</span><span class="v">'+esc(S.equipos[masExp].nombre)+'</span></div>';
      if (maxS>0) h += '<div class="stat"><span>🙈 El que más salteó</span><span class="v">'+esc(S.equipos[masSalt].nombre)+'</span></div>';
    }
    h += '<div class="col" style="margin-top:20px"><button class="btn rojo" id="revan">↻ REVANCHA (mismos equipos)</button>'+
      '<button class="btn sec" id="home">🏠 Volver al inicio</button></div>';
    app.innerHTML = h;
    document.getElementById("revan").onclick = iniciarPartida;
    document.getElementById("home").onclick = () => { S.scr = "inicio"; render(); };
    return;
  }
}

/* ===== pantalla de juego (con actualización in-place para fluidez) ===== */
function pintarJugando(full){
  const eq = S.equipos[S.equipoActual];

  if (S.modo === "frente"){
    if (full){
      const usaBotones = !S.tiltOk || !S.tiltActivo;
      app.innerHTML =
        '<div class="frente-play">'+
          '<div class="tt'+(S.seg<=10?" urgente":"")+'" id="timerFrente" role="timer" aria-label="Tiempo restante">'+fmtTime(S.seg)+'</div>'+
          '<p class="peli frente" id="peliF">'+(S.peli?esc(S.peli.titulo):"")+'</p>'+
          '<div class="fb-row" id="frenteFb" style="display:'+(usaBotones?"flex":"none")+'">'+
            '<button class="btn naranja" style="flex:1" id="bPasar">PASAR ↑</button>'+
            '<button class="btn verde" style="flex:1" id="bAcerto">ACERTÓ ↓</button></div>'+
          '<p class="hint" id="frenteHint" style="display:'+(usaBotones?"none":"block")+'">Incliná el celu hacia <b>abajo</b> = acertaron · hacia <b>arriba</b> = pasar.<br>Volvé al centro entre cada peli.</p>'+
          '<div id="srAlert" class="sr-only" aria-live="assertive"></div>'+
          '<div class="frente-acts">'+
            '<button class="link" id="usarBotones">usar botones</button>'+
            '<button class="link" id="deshacer" style="display:'+(S.ultimo?"inline-block":"none")+'">↶ deshacer</button>'+
            '<button class="link" id="pausaBtn">❚❚ pausa</button>'+
            '<button class="link" id="terminar">terminar</button>'+
          '</div>'+
        '</div>';
      const bp = document.getElementById("bPasar"); if (bp) bp.onclick = () => registrar(false);
      const ba = document.getElementById("bAcerto"); if (ba) ba.onclick = () => registrar(true);
      document.getElementById("terminar").onclick = finTurno;
      document.getElementById("pausaBtn").onclick = pausarTurno;
      document.getElementById("deshacer").onclick = revertirUltimo;
      document.getElementById("usarBotones").onclick = () => {
        const fb = document.getElementById("frenteFb"); if (fb) fb.style.display = "flex";
        const hint = document.getElementById("frenteHint"); if (hint) hint.style.display = "none";
      };
      ajustarTitulo(document.getElementById("peliF"), "frente");
    } else {
      const p = document.getElementById("peliF"); if (p && S.peli){ p.textContent = S.peli.titulo; ajustarTitulo(p, "frente"); }
      const du = document.getElementById("deshacer"); if (du) du.style.display = S.ultimo ? "inline-block" : "none";
    }
    return;
  }

  // modo clásico
  const meta = S.peli ? META[S.peli.titulo] : null;
  const cat = S.peli ? catDe(S.peli.cat) : null;
  if (full){
    let h = '<div class="center" style="display:flex;justify-content:space-between;align-items:center">'+
        '<span class="tag" style="border-color:'+eq.color+';color:'+eq.color+'">'+esc(eq.nombre)+'</span>'+
        '<span class="muted" id="cont" aria-live="polite">✓ '+S.turno.aciertos+' · ⤳ '+S.turno.salteos+'</span></div>'+
      '<div class="timer'+(S.seg<=10?" urgente":"")+'" id="timer" role="timer" aria-label="Tiempo restante">'+fmtTime(S.seg)+'</div>'+
      '<div id="srAlert" class="sr-only" aria-live="assertive"></div>'+
      '<div class="card" style="cursor:default;min-height:170px;display:flex;flex-direction:column;justify-content:center" id="cardPeli">'+
        contenidoCardClasico(meta, cat)+'</div>';
    if (S.pistasOn) h += '<div class="center" style="margin:10px 0"><button class="link" id="pista">💡 Pedir pista (esta peli pasa a valer 0)</button></div>';
    h += '<div class="row" style="margin-top:6px">'+
        '<button class="btn naranja" style="flex:1" id="bPasar">SALTEAR</button>'+
        '<button class="btn verde" style="flex:2" id="bAcerto">¡ADIVINARON!</button></div>'+
      '<div class="foot" style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap">'+
        '<button class="link" id="deshacer" style="display:'+(S.ultimo?"inline-block":"none")+'">↶ deshacer</button>'+
        '<button class="link" id="pausaBtn">❚❚ pausa</button>'+
        '<button class="link" id="terminar">terminar turno</button></div>';
    app.innerHTML = h;
    document.getElementById("bPasar").onclick = () => registrar(false);
    document.getElementById("bAcerto").onclick = () => registrar(true);
    document.getElementById("terminar").onclick = finTurno;
    document.getElementById("pausaBtn").onclick = pausarTurno;
    document.getElementById("deshacer").onclick = revertirUltimo;
    const pst = document.getElementById("pista"); if (pst) pst.onclick = usarPista;
    ajustarTitulo(document.querySelector("#cardPeli .peli"), "clasica");
  } else {
    const card = document.getElementById("cardPeli"); if (card){ card.innerHTML = contenidoCardClasico(meta, cat); ajustarTitulo(card.querySelector(".peli"), "clasica"); }
    const cont = document.getElementById("cont"); if (cont) cont.textContent = "✓ "+S.turno.aciertos+" · ⤳ "+S.turno.salteos;
    const du = document.getElementById("deshacer"); if (du) du.style.display = S.ultimo ? "inline-block" : "none";
  }
}
function contenidoCardClasico(meta, cat){
  let h = "";
  if (cat) h += '<span class="tag" style="margin-bottom:10px">'+cat.emoji+' '+esc(cat.nombre)+'</span>';
  if (S.peli) h += '<p class="peli">'+esc(S.peli.titulo)+'</p>';
  if (S.pistaUsada > 0 && S.peli){
    const t = S.peli.titulo;
    h += '<div class="pista-box">';
    h += '<div>🎞️ <b>Género:</b> '+esc(cat?cat.genero:"película")+'</div>';
    if (S.pistaUsada >= 2) h += '<div>🔤 <b>Empieza con:</b> «'+esc(t[0].toUpperCase())+'» · '+t.split(" ").length+' palabra(s)</div>';
    if (S.pistaUsada >= 3){
      if (meta && meta.a) h += '<div>📅 <b>Año:</b> '+meta.a+'</div>';
      if (meta && meta.p) h += '<div>⭐ <b>Protagónico:</b> '+esc(meta.p)+'</div>';
      if (!meta) h += '<div class="muted">No hay más datos de esta peli. ¡A puro gesto!</div>';
    }
    h += '</div>';
  }
  return h;
}

/* ===== teclado: Enter/Espacio activan los controles con role (cards/catrows/switches/chips) ===== */
document.addEventListener("keydown", (e) => {
  if (e.key !== "Enter" && e.key !== " ") return;
  const t = e.target;
  if (!t || !t.getAttribute) return;
  const r = t.getAttribute("role");
  if (r === "button" || r === "checkbox" || r === "switch"){ e.preventDefault(); t.click(); }
});

/* ===== ajuste dinamico del tamano de titulos largos ===== */
function ajustarTitulo(el, modo){
  if (!el) return;
  const n = (el.textContent || "").length;
  const px = modo === "frente"
    ? (n > 40 ? 32 : n > 28 ? 42 : n > 18 ? 52 : 60)
    : (n > 40 ? 28 : n > 30 ? 34 : n > 22 ? 40 : 46);
  el.style.fontSize = px + "px";
}

/* ===== persistencia (localStorage) ===== */
const CLAVE = "mimica.v1";
function guardarEstado(){
  try {
    localStorage.setItem(CLAVE, JSON.stringify({
      modo:S.modo, equipos:S.equipos, cats:S.cats, duracion:S.duracion, rondasTot:S.rondasTot,
      penalidad:S.penalidad, pistasOn:S.pistasOn, scr:S.scr, mazo:S.mazo, idx:S.idx,
      equipoActual:S.equipoActual, ronda:S.ronda, seg:S.seg, turno:S.turno, stats:S.stats, muerte:S.muerte
    }));
  } catch(e){}
}
function hayPartidaGuardada(){
  try { const g = JSON.parse(localStorage.getItem(CLAVE)); return !!(g && g.scr && g.scr !== "inicio" && g.scr !== "ganador"); }
  catch(e){ return false; }
}
function continuarPartida(){
  try {
    const g = JSON.parse(localStorage.getItem(CLAVE));
    if (!g) return;
    Object.assign(S, g);
    S.corriendo = false; S.pausado = false; S.ultimo = null;
    // no reanudamos el cronometro en caliente: las pantallas activas vuelven a "turno" en pausa
    if (S.scr === "jugando" || S.scr === "contando") S.scr = "turno";
    pararTimer(); pararTilt();
    render();
  } catch(e){}
}
/* guardado anti-perdida cuando el celu pasa a segundo plano */
document.addEventListener("visibilitychange", () => { if (document.hidden) guardarEstado(); });
window.addEventListener("pagehide", guardarEstado);

render();
</script>
