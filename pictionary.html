<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700..900&family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --celeste:#4AA3C7; --celeste2:#74C0DF; --celesteSoft:#DFF1F8;
  --sol:#F6C445; --sol2:#FFD972;
  --tinta:#1E2A33; --suave:#5A6B76;
  --blanco:#FFFFFF; --crema:#FBF7EE;
  --verde:#2FAE66; --rojo:#E5524B; --naranja:#F08A3C; --violeta:#7C5CCB;
  --ft:'Bricolage Grotesque',system-ui,sans-serif;
  --fb:'Nunito',system-ui,sans-serif;
  --sombra:0 8px 0 rgba(30,42,51,.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:var(--fb); color:var(--tinta);
  background:
    radial-gradient(120% 120% at 50% -10%, var(--celeste2) 0%, var(--celeste) 45%, #3690B4 100%);
  user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  overflow:hidden;
}
#root{height:100%}

/* ====== Layout base ====== */
.screen{
  height:100%; width:100%; max-width:520px; margin:0 auto;
  display:flex; flex-direction:column;
  padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.grow{flex:1}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.stack{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;align-items:center}
.wrap{flex-wrap:wrap}

/* ====== Tipografía ====== */
h1.logo{font-family:var(--ft);font-weight:900;color:#fff;line-height:.92;
  font-size:clamp(44px,15vw,72px);letter-spacing:-1px;
  text-shadow:0 4px 0 rgba(30,42,51,.22)}
.logo .sol{color:var(--sol)}
.tag{font-family:var(--ft);font-weight:800;color:#fff;opacity:.92;font-size:16px;letter-spacing:.5px}
h2{font-family:var(--ft);font-weight:800;font-size:26px;color:var(--tinta);letter-spacing:-.5px}
h2.light{color:#fff}
.sub{color:var(--suave);font-weight:600;font-size:15px}
.sub.light{color:rgba(255,255,255,.85)}

/* ====== Tarjetas ====== */
.card{background:var(--blanco);border-radius:22px;padding:18px;box-shadow:var(--sombra)}
.card.crema{background:var(--crema)}

/* ====== Botones ====== */
.btn{
  font-family:var(--ft);font-weight:800;font-size:19px;letter-spacing:.3px;
  border:none;border-radius:18px;padding:17px 20px;width:100%;cursor:pointer;
  color:#fff;background:var(--tinta);box-shadow:0 6px 0 rgba(30,42,51,.35);
  transition:transform .05s, box-shadow .05s; touch-action:manipulation;
}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(30,42,51,.35)}
.btn:disabled{opacity:.4;box-shadow:none}
.btn.sol{background:var(--sol);color:var(--tinta);box-shadow:0 6px 0 #D9A82F}
.btn.sol:active{box-shadow:0 2px 0 #D9A82F}
.btn.verde{background:var(--verde);box-shadow:0 6px 0 #1E7E48}
.btn.verde:active{box-shadow:0 2px 0 #1E7E48}
.btn.rojo{background:var(--rojo);box-shadow:0 6px 0 #B23A34}
.btn.rojo:active{box-shadow:0 2px 0 #B23A34}
.btn.celeste{background:var(--celeste);box-shadow:0 6px 0 #2F7E9C}
.btn.celeste:active{box-shadow:0 2px 0 #2F7E9C}
.btn.ghost{background:transparent;color:#fff;box-shadow:none;border:2px solid rgba(255,255,255,.6)}
.btn.ghost.dark{color:var(--tinta);border-color:rgba(30,42,51,.25)}
.btn.sm{font-size:15px;padding:12px 14px}
.btn.auto{width:auto}

/* ====== Inputs ====== */
input.txt{
  flex:1;font-family:var(--fb);font-weight:700;font-size:16px;color:var(--tinta);
  background:#fff;border:2px solid #E3E8EB;border-radius:14px;padding:13px 14px;outline:none;
}
input.txt:focus{border-color:var(--celeste)}

/* ====== Chips / toggles ====== */
.chip{
  font-family:var(--ft);font-weight:800;font-size:14px;letter-spacing:.3px;
  border:2px solid #E3E8EB;background:#fff;color:var(--suave);
  border-radius:999px;padding:10px 16px;cursor:pointer;transition:all .12s;
}
.chip.on{background:var(--tinta);color:#fff;border-color:var(--tinta)}
.chip.on.celeste{background:var(--celeste);border-color:var(--celeste)}

.optrow{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 4px;border-bottom:1px dashed #E3E8EB}
.optrow:last-child{border-bottom:none}
.optname{font-family:var(--ft);font-weight:800;font-size:16px}
.optdesc{font-size:13px;color:var(--suave);font-weight:600}

/* check de categoría */
.catbtn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:#fff;border:2px solid #E3E8EB;border-radius:16px;padding:14px;cursor:pointer;transition:all .12s}
.catbtn.on{border-color:var(--celeste);background:var(--celesteSoft)}
.catbox{width:26px;height:26px;border-radius:8px;border:2px solid #C9D2D7;display:grid;place-items:center;
  font-size:16px;flex-shrink:0;background:#fff;color:#fff}
.catbtn.on .catbox{background:var(--verde);border-color:var(--verde)}
.catemoji{font-size:24px}
.cattxt{flex:1}
.catname{font-family:var(--ft);font-weight:800;font-size:16px}
.catcount{font-size:12px;color:var(--suave);font-weight:700}

/* switch */
.switch{width:54px;height:32px;border-radius:999px;background:#D5DCE0;position:relative;
  cursor:pointer;transition:background .15s;flex-shrink:0}
.switch.on{background:var(--verde)}
.switch .knob{position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;
  background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.2);transition:left .15s}
.switch.on .knob{left:25px}

/* ====== Equipos ====== */
.teamcard{border-radius:18px;padding:14px;color:#fff;box-shadow:var(--sombra)}
.teamhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.teamdot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:20px;background:rgba(255,255,255,.25)}
.teamname-in{flex:1;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);
  border-radius:12px;padding:10px 12px;color:#fff;font-family:var(--ft);font-weight:800;font-size:17px;outline:none}
.teamname-in::placeholder{color:rgba(255,255,255,.7)}
.player{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);
  border-radius:10px;padding:7px 10px;font-weight:700;font-size:14px}
.player .x{margin-left:auto;opacity:.8;cursor:pointer;font-size:18px;padding:0 4px}
.addp{display:flex;gap:8px;margin-top:8px}
.addp input{flex:1;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.3);
  border-radius:10px;padding:9px 10px;color:#fff;font-weight:700;outline:none;font-family:var(--fb)}
.addp input::placeholder{color:rgba(255,255,255,.7)}
.addp button{background:#fff;border:none;border-radius:10px;width:44px;font-size:24px;font-weight:800;cursor:pointer}

/* ====== Reloj ====== */
.clock{font-family:var(--ft);font-weight:900;font-size:64px;letter-spacing:1px;line-height:1}
.clock.warn{color:var(--rojo);animation:pulse .5s infinite alternate}
@keyframes pulse{to{transform:scale(1.08)}}
.tbar{height:10px;border-radius:999px;background:rgba(0,0,0,.12);overflow:hidden;margin-top:8px}
.tbar>i{display:block;height:100%;background:var(--verde);border-radius:999px;transition:width 1s linear}
.tbar>i.mid{background:var(--sol)}
.tbar>i.low{background:var(--rojo)}

/* ====== Pantalla de dibujo ====== */
.draw-wrap{position:fixed;inset:0;background:var(--celesteSoft);display:flex;flex-direction:column;max-width:520px;margin:0 auto;left:0;right:0}
.draw-top{display:flex;align-items:center;gap:12px;padding:max(12px,env(safe-area-inset-top)) 14px 8px}
.draw-top .word{flex:1;text-align:center;font-family:var(--ft);font-weight:900;font-size:22px;
  text-transform:uppercase;letter-spacing:.5px;color:var(--tinta);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.miniclock{font-family:var(--ft);font-weight:900;font-size:26px;min-width:54px;text-align:center}
.miniclock.warn{color:var(--rojo)}
canvas#board{flex:1;background:#fff;touch-action:none;display:block;width:100%}
.tools{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;
  border-top:1px solid #E3E8EB;overflow-x:auto}
.swatch{width:30px;height:30px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 1.5px #CDD6DB;cursor:pointer;flex-shrink:0}
.swatch.on{box-shadow:0 0 0 3px var(--tinta);transform:scale(1.12)}
.tool{width:42px;height:42px;border-radius:12px;border:2px solid #E3E8EB;background:#fff;
  font-size:20px;display:grid;place-items:center;cursor:pointer;flex-shrink:0}
.tool.on{background:var(--celesteSoft);border-color:var(--celeste)}
.sizes{display:flex;gap:6px;align-items:center;flex-shrink:0}
.sizedot{display:grid;place-items:center;width:34px;height:34px;border-radius:10px;border:2px solid #E3E8EB;background:#fff;cursor:pointer;flex-shrink:0}
.sizedot.on{border-color:var(--celeste);background:var(--celesteSoft)}
.sizedot i{display:block;border-radius:50%;background:var(--tinta)}
.draw-bottom{display:flex;gap:10px;padding:10px 12px max(12px,env(safe-area-inset-bottom));background:#fff;border-top:1px solid #E3E8EB}
.draw-bottom .btn{font-size:20px;padding:16px}

/* ====== Scoreboard ====== */
.scorerow{display:flex;align-items:center;gap:12px;padding:14px;border-radius:16px;background:#fff;box-shadow:0 4px 0 rgba(30,42,51,.1);margin-bottom:10px}
.scorerow .rank{font-family:var(--ft);font-weight:900;font-size:20px;width:30px;color:var(--suave)}
.scorerow .nm{flex:1;font-family:var(--ft);font-weight:800;font-size:18px}
.scorerow .pts{font-family:var(--ft);font-weight:900;font-size:26px}
.scorerow .dot{width:14px;height:14px;border-radius:50%}

/* ====== Confetti / fin ====== */
.trophy{font-size:90px;animation:bounce 1s infinite alternate ease-in-out}
@keyframes bounce{to{transform:translateY(-14px) rotate(4deg)}}
.statline{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed rgba(255,255,255,.3);color:#fff;font-weight:700}
.statline:last-child{border:none}
.statline .e{font-size:24px}
.statline b{margin-left:auto;font-family:var(--ft);font-weight:900}

.fade{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);background:var(--tinta);color:#fff;
  font-family:var(--ft);font-weight:800;padding:14px 22px;border-radius:14px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:fade .2s}
.pill{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-weight:800;font-size:13px;padding:5px 12px;border-radius:999px}
.hint{font-size:13px;color:var(--suave);font-weight:600;text-align:center}
</style>

const {useState, useRef, useEffect, useCallback} = React;

/* Paleta del canvas (6-8 colores) */
const COLORES = ['#1E2A33','#E5524B','#F08A3C','#F6C445','#2FAE66','#4AA3C7','#7C5CCB','#E36BA4'];
const GROSORES = [4, 9, 18, 30];

const TEAM_EMOJIS = ['🦊','🐯','🐸','🦁','🐙','🦄','🐧','🐲'];

/* =====================================================================
   AUDIO — tic-tac, fanfarria y bocinazo con Web Audio API (sin archivos).
   ===================================================================== */
const Audio = (() => {
  let ctx = null;
  const ac = () => { if(!ctx){ try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; };
  const beep = (freq, dur, type='sine', vol=0.2, when=0) => {
    const c = ac(); if(!c) return;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    const t = c.currentTime + when;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+0.02);
  };
  return {
    unlock(){ const c = ac(); if(c && c.state==='suspended') c.resume(); },
    tick(){ beep(880, 0.05, 'square', 0.08); },
    tock(){ beep(660, 0.05, 'square', 0.08); },
    acierto(){ // fanfarria
      [523,659,784,1046].forEach((f,i)=>beep(f,0.18,'triangle',0.25,i*0.09));
    },
    bocina(){ // se acabó el tiempo
      beep(180,0.5,'sawtooth',0.3); beep(140,0.55,'sawtooth',0.25,0.05);
    },
    pop(){ beep(440,0.08,'sine',0.15); },
  };
})();

const vibrar = (ms) => { try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} };

/* =====================================================================
   CANVAS — dibujo suave con pointer events. Deshacer por snapshots.
   El trazo se pinta directo sobre el canvas (no pasa por React) => sin lag.
   ===================================================================== */
function Pizarra({ color, grosor, borrador, apiRef }){
  const ref = useRef(null);
  const draw = useRef({on:false, x:0, y:0});
  const undoStack = useRef([]);

  const getCtx = () => ref.current.getContext('2d');

  const setup = useCallback(() => {
    const cv = ref.current; if(!cv) return;
    const dpr = window.devicePixelRatio || 1;
    const r = cv.getBoundingClientRect();
    cv.width = Math.round(r.width * dpr);
    cv.height = Math.round(r.height * dpr);
    const ctx = getCtx();
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,r.width,r.height);
    undoStack.current = [];
  }, []);

  useEffect(() => {
    setup();
    const onResize = () => setup();
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);
    return () => { window.removeEventListener('resize', onResize); window.removeEventListener('orientationchange', onResize); };
  }, [setup]);

  // Guardamos snapshot ANTES de cada trazo => deshacer vuelve al estado previo.
  const snapshot = () => {
    const cv = ref.current; const ctx = getCtx();
    try{
      const img = ctx.getImageData(0,0,cv.width,cv.height);
      undoStack.current.push(img);
      if(undoStack.current.length > 25) undoStack.current.shift();
    }catch(e){}
  };

  // Exponemos undo y clear al padre.
  useEffect(() => {
    apiRef.current = {
      undo(){
        if(!undoStack.current.length) return;
        const img = undoStack.current.pop();
        getCtx().putImageData(img, 0, 0);
      },
      clear(){
        snapshot();
        const cv = ref.current; const r = cv.getBoundingClientRect();
        const ctx = getCtx();
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,r.width,r.height);
      }
    };
  });

  const pos = (e) => {
    const r = ref.current.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  };

  const down = (e) => {
    e.preventDefault();
    snapshot();
    const p = pos(e);
    draw.current = {on:true, x:p.x, y:p.y};
    const ctx = getCtx();
    ctx.strokeStyle = borrador ? '#fff' : color;
    ctx.lineWidth = borrador ? grosor*2.4 : grosor;
    // punto inicial (para que un toque marque)
    ctx.beginPath(); ctx.arc(p.x,p.y, ctx.lineWidth/2, 0, Math.PI*2);
    ctx.fillStyle = ctx.strokeStyle; ctx.fill();
    ctx.beginPath(); ctx.moveTo(p.x,p.y);
  };
  const move = (e) => {
    if(!draw.current.on) return;
    e.preventDefault();
    const ctx = getCtx();
    // coalesced events => trazo más suave en dispositivos que lo soportan
    const evs = e.nativeEvent.getCoalescedEvents ? e.nativeEvent.getCoalescedEvents() : [e.nativeEvent];
    for(const ev of evs){
      const r = ref.current.getBoundingClientRect();
      const x = ev.clientX - r.left, y = ev.clientY - r.top;
      ctx.lineTo(x,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y);
    }
  };
  const up = () => { draw.current.on = false; };

  return <canvas id="board" ref={ref}
    onPointerDown={down} onPointerMove={move}
    onPointerUp={up} onPointerCancel={up} onPointerLeave={up} />;
}

/* =====================================================================
   APP
   ===================================================================== */
function App(){
  const [pantalla, setPantalla] = useState('inicio'); // inicio | equipos | config | reparto | mirar | dibujar | ronda | tablero | fin
  const [toast, setToast] = useState('');

  // Equipos
  const [equipos, setEquipos] = useState([
    {id:1, nombre:'', jugadores:[], score:0, salteos:0},
    {id:2, nombre:'', jugadores:[], score:0, salteos:0},
  ]);

  // Config
  const [catsOn, setCatsOn] = useState(() => new Set(CATS.map(c=>c.id)));
  const [dif, setDif] = useState('todas');     // facil | dificil | todas
  const [picante, setPicante] = useState(false);
  const [tiempo, setTiempo] = useState(90);
  const [rondas, setRondas] = useState(3);
  const [penalSaltear, setPenalSaltear] = useState(false);

  // Estado de partida
  const [turno, setTurno] = useState({eq:0, ronda:1});
  const [palabra, setPalabra] = useState('');
  const [usadas, setUsadas] = useState(() => new Set());
  const [stats, setStats] = useState({ rapido:null, drawCount:[] });

  const mostrarToast = (t) => { setToast(t); setTimeout(()=>setToast(''), 1400); };

  /* ---------- Pool de palabras según config ---------- */
  const armarPool = useCallback(() => {
    let lista = [];
    const fuentes = [...CATS];
    if(picante) fuentes.push(PICANTE);
    for(const c of fuentes){
      if(c.id !== 'picante' && !catsOn.has(c.id)) continue;
      if(dif === 'todas' || dif === 'facil') lista = lista.concat(c.f);
      if(dif === 'todas' || dif === 'dificil') lista = lista.concat(c.d);
    }
    return lista;
  }, [catsOn, dif, picante]);

  const sacarPalabra = useCallback((usadasSet) => {
    const pool = armarPool();
    const dispo = pool.filter(p => !usadasSet.has(p));
    const fuente = dispo.length ? dispo : pool;          // si se agotan, reciclamos
    return fuente[Math.floor(Math.random()*fuente.length)] || 'che, dibujá algo';
  }, [armarPool]);

  /* ---------- Navegación de equipos ---------- */
  const updEquipo = (i, patch) => setEquipos(es => es.map((e,j)=> j===i ? {...e,...patch} : e));
  const addEquipo = () => setEquipos(es => es.length>=6 ? es : [...es, {id:Date.now(), nombre:'', jugadores:[], score:0, salteos:0}]);
  const delEquipo = (i) => setEquipos(es => es.length<=2 ? es : es.filter((_,j)=>j!==i));
  const addJugador = (i, nombre) => { const n=nombre.trim(); if(!n) return; updEquipo(i, {jugadores:[...equipos[i].jugadores, n]}); };
  const delJugador = (i, j) => updEquipo(i, {jugadores: equipos[i].jugadores.filter((_,k)=>k!==j)});

  /* ---------- Empezar partida ---------- */
  const empezar = () => {
    Audio.unlock();
    // normalizamos nombres y reseteamos puntajes
    const norm = equipos.map((e,i)=>({
      ...e,
      nombre: e.nombre.trim() || `Equipo ${i+1}`,
      score:0, salteos:0,
      drawerIdx:0,
    }));
    setEquipos(norm);
    setStats({rapido:null});
    setUsadas(new Set());
    setTurno({eq:0, ronda:1});
    setPantalla('reparto');
  };

  const poolCount = armarPool().length;

  /* ---------- Render por pantalla ---------- */
  return (
    <>
      {toast && <div className="toast">{toast}</div>}

      {pantalla==='inicio'   && <Inicio onJugar={()=>{Audio.unlock();setPantalla('equipos');}} />}

      {pantalla==='equipos'  &&
        <Equipos equipos={equipos} updEquipo={updEquipo} addEquipo={addEquipo} delEquipo={delEquipo}
          addJugador={addJugador} delJugador={delJugador}
          onVolver={()=>setPantalla('inicio')} onSeguir={()=>setPantalla('config')} />}

      {pantalla==='config'   &&
        <Config catsOn={catsOn} setCatsOn={setCatsOn} dif={dif} setDif={setDif}
          picante={picante} setPicante={setPicante} tiempo={tiempo} setTiempo={setTiempo}
          rondas={rondas} setRondas={setRondas} penalSaltear={penalSaltear} setPenalSaltear={setPenalSaltear}
          poolCount={poolCount}
          onVolver={()=>setPantalla('equipos')}
          onJugar={()=>{ if(poolCount<4){mostrarToast('Elegí más categorías 🙏');return;} empezar(); }} />}

      {pantalla==='reparto'  &&
        <Reparto equipo={equipos[turno.eq]} ronda={turno.ronda} totalRondas={rondas}
          onListo={()=>{
            const w = sacarPalabra(usadas);
            setPalabra(w);
            setUsadas(u => new Set(u).add(w));
            setPantalla('mirar');
          }} />}

      {pantalla==='mirar'    &&
        <Mirar equipo={equipos[turno.eq]} palabra={palabra}
          onOtra={()=>{ const w=sacarPalabra(usadas); setPalabra(w); setUsadas(u=>new Set(u).add(w)); }}
          onEmpezar={()=>{ Audio.unlock(); setPantalla('dibujar'); }} />}

      {pantalla==='dibujar'  &&
        <Dibujar equipo={equipos[turno.eq]} palabra={palabra} tiempo={tiempo} penalSaltear={penalSaltear}
          onResultado={(adivino, segUsados)=>{
            setEquipos(es => es.map((e,i)=> i===turno.eq
              ? {...e, score: e.score + (adivino?1:0)}
              : e));
            if(adivino){
              Audio.acierto(); vibrar([60,40,120]);
              // récord de rapidez
              setStats(s => {
                if(!s.rapido || segUsados < s.rapido.seg)
                  return {...s, rapido:{eq:turno.eq, seg:segUsados}};
                return s;
              });
            }
            setPantalla('ronda');
            window.__ultimoResultado = {adivino, segUsados};
          }}
          onSaltear={()=>{
            setEquipos(es => es.map((e,i)=> i===turno.eq
              ? {...e, salteos:e.salteos+1, score: e.score + (penalSaltear?-1:0)} : e));
            Audio.pop();
            // nueva palabra, sigue el mismo turno
            const w = sacarPalabra(usadas);
            setPalabra(w); setUsadas(u=>new Set(u).add(w));
          }}
          onTiempo={()=>{ Audio.bocina(); vibrar([300,80,300]); setPantalla('ronda'); window.__ultimoResultado={adivino:false, agoto:true}; }}
        />}

      {pantalla==='ronda'    &&
        <FinRonda equipos={equipos} turno={turno} resultado={window.__ultimoResultado||{}}
          onSeguir={()=>{
            // ¿avanzamos de equipo / ronda / fin?
            const nextEq = turno.eq + 1;
            if(nextEq < equipos.length){
              setTurno(t=>({...t, eq:nextEq}));
              setPantalla('reparto');
            } else {
              // terminó la vuelta: ¿más rondas?
              if(turno.ronda < rondas){
                setEquipos(es => es.map(e=>({...e, drawerIdx:(e.drawerIdx+1)% Math.max(1,e.jugadores.length||1)})));
                setTurno({eq:0, ronda:turno.ronda+1});
                setPantalla('reparto');
              } else {
                setPantalla('tablero');
              }
            }
          }} />}

      {pantalla==='tablero'  &&
        <Tablero equipos={equipos}
          onVerFin={()=>setPantalla('fin')} />}

      {pantalla==='fin'      &&
        <Fin equipos={equipos} stats={stats} tiempo={tiempo}
          sacarPalabra={()=>{ const w=sacarPalabra(usadas); setPalabra(w); setUsadas(u=>new Set(u).add(w)); return w; }}
          setEquipos={setEquipos} setTurno={setTurno} setPantalla={setPantalla} setPalabra={setPalabra}
          usadas={usadas} setUsadas={setUsadas}
          onReiniciar={()=>{
            setEquipos(es => es.map((e,i)=>({...e, nombre:e.nombre, score:0, salteos:0, drawerIdx:0})));
            setStats({rapido:null}); setUsadas(new Set()); setTurno({eq:0,ronda:1});
            setPantalla('reparto');
          }}
          onInicio={()=>setPantalla('inicio')} />}
    </>
  );
}

function Dibujar({equipo, palabra, tiempo, penalSaltear, onResultado, onSaltear, onTiempo}){
  const [color, setColor] = useState(COLORES[0]);
  const [grosor, setGrosor] = useState(GROSORES[1]);
  const [borrador, setBorrador] = useState(false);
  const [restante, setRestante] = useState(tiempo);
  const apiRef = useRef({});
  const finRef = useRef(false);

  // Cronómetro
  useEffect(() => {
    finRef.current = false;
    setRestante(tiempo);
    const id = setInterval(() => {
      setRestante(r => {
        const n = r - 1;
        if(n <= 0){ clearInterval(id); if(!finRef.current){ finRef.current=true; onTiempo(); } return 0; }
        if(n <= 5){ Audio.tock(); vibrar(20); }
        else if(n <= 10){ (n%2? Audio.tick(): Audio.tock()); }
        return n;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [tiempo]);

  const usados = tiempo - restante;
  const pct = Math.max(0, (restante/tiempo)*100);
  const barClass = pct>50?'':(pct>20?'mid':'low');
  const warn = restante<=10;

  const adivinaron = () => { if(finRef.current) return; finRef.current=true; onResultado(true, usados); };

  return (
    <div className="draw-wrap fade">
      <div className="draw-top">
        <span className="pill" style={{background:'rgba(0,0,0,.08)',color:'var(--tinta)'}}>{equipo.nombre}</span>
        <div className="word">{palabra}</div>
        <div className={'miniclock'+(warn?' warn':'')}>{restante}s</div>
      </div>
      <div className="tbar" style={{margin:'0 12px'}}><i className={barClass} style={{width:pct+'%'}}/></div>

      <Pizarra color={color} grosor={grosor} borrador={borrador} apiRef={apiRef} />

      {/* Herramientas */}
      <div className="tools">
        {COLORES.map(c=>(
          <div key={c} className={'swatch'+(!borrador&&color===c?' on':'')}
            style={{background:c}} onClick={()=>{setColor(c);setBorrador(false);}}/>
        ))}
        <div style={{width:1,height:30,background:'#E3E8EB',flexShrink:0}}/>
        <div className="sizes">
          {GROSORES.map(g=>(
            <div key={g} className={'sizedot'+(grosor===g?' on':'')} onClick={()=>setGrosor(g)}>
              <i style={{width:Math.min(g,22),height:Math.min(g,22)}}/>
            </div>
          ))}
        </div>
        <div style={{width:1,height:30,background:'#E3E8EB',flexShrink:0}}/>
        <div className={'tool'+(borrador?' on':'')} onClick={()=>setBorrador(b=>!b)}>🧽</div>
        <div className="tool" onClick={()=>apiRef.current.undo&&apiRef.current.undo()}>↩️</div>
        <div className="tool" onClick={()=>apiRef.current.clear&&apiRef.current.clear()}>🗑️</div>
      </div>

      {/* Acciones */}
      <div className="draw-bottom">
        <button className="btn rojo" onClick={onSaltear}>SALTEAR{penalSaltear?' (-1)':''} ⏭️</button>
        <button className="btn verde" onClick={adivinaron}>¡ADIVINARON! ✅</button>
      </div>
    </div>
  );
}

function FinRonda({equipos, turno, resultado, onSeguir}){
  const eq = equipos[turno.eq];
  const ok = resultado.adivino;
  return (
    <div className="screen center fade">
      <div className="grow center" style={{gap:16}}>
        <div style={{fontSize:80}}>{ok?'🎉':(resultado.agoto?'⏰':'😬')}</div>
        <h2 className="light">{ok? '¡La sacaron!' : (resultado.agoto? 'Se acabó el tiempo' : 'Esta vez no…')}</h2>
        {ok && <div className="sub light">en {resultado.segUsados}s · sos un crack 😎</div>}
        <div className="card" style={{width:'100%'}}>
          <div className="row" style={{justifyContent:'space-between'}}>
            <span className="optname">{eq.nombre}</span>
            <span style={{fontFamily:'var(--ft)',fontWeight:900,fontSize:26,color: ok?'var(--verde)':'var(--suave)'}}>
              {eq.score} {ok&&'(+1)'}
            </span>
          </div>
        </div>
      </div>
      <button className="btn sol" onClick={onSeguir}>SIGUIENTE TURNO →</button>
    </div>
  );
}

function ordenar(equipos){
  return equipos.map((e,i)=>({...e,_i:i})).sort((a,b)=> b.score-a.score);
}

function Tablero({equipos, onVerFin}){
  const orden = ordenar(equipos);
  return (
    <div className="screen fade">
      <div className="center" style={{marginBottom:16}}>
        <div style={{fontSize:50}}>📊</div>
        <h2 className="light">Tablero de puntajes</h2>
      </div>
      <div className="grow">
        {orden.map((e,r)=>(
          <div className="scorerow" key={e.id}>
            <span className="rank">{r===0?'🥇':r===1?'🥈':r===2?'🥉':`${r+1}°`}</span>
            <span className="dot" style={{background:TEAM_COLORS[e._i%TEAM_COLORS.length]}}/>
            <span className="nm">{e.nombre}</span>
            <span className="pts">{e.score}</span>
          </div>
        ))}
      </div>
      <button className="btn sol" onClick={onVerFin}>VER GANADOR 🏆</button>
    </div>
  );
}

function Fin({equipos, stats, tiempo, onReiniciar, onInicio, sacarPalabra, setPalabra, setEquipos, setTurno, setPantalla, usadas, setUsadas}){
  const orden = ordenar(equipos);
  const top = orden[0].score;
  const empatados = orden.filter(e=>e.score===top);
  const hayEmpate = empatados.length>1;

  const masSalteador = [...equipos].sort((a,b)=>b.salteos-a.salteos)[0];
  const rapidoEq = stats.rapido!=null ? equipos[stats.rapido.eq] : null;

  const [muerteSubita, setMuerteSubita] = useState(false);

  // Modo muerte súbita: el primero que acierte gana. Turno simple sobre los empatados.
  if(muerteSubita){
    return <MuerteSubita empatados={empatados} tiempo={tiempo}
      sacarPalabra={sacarPalabra}
      onGana={(idGanador)=>{
        setEquipos(es=>es.map(e=> e.id===idGanador ? {...e, score:e.score+1} : e));
        setMuerteSubita(false);
      }} />;
  }

  return (
    <div className="screen center fade">
      <div className="grow center" style={{gap:10}}>
        {hayEmpate ? (
          <>
            <div style={{fontSize:70}}>🤝</div>
            <h2 className="light">¡Empate técnico!</h2>
            <div className="sub light">{empatados.map(e=>e.nombre).join(' y ')} con {top} puntos</div>
            <button className="btn sol" style={{maxWidth:300,marginTop:8}} onClick={()=>setMuerteSubita(true)}>
              ⚡ MUERTE SÚBITA
            </button>
          </>
        ) : (
          <>
            <div className="trophy">🏆</div>
            <h2 className="light" style={{fontSize:30}}>¡Ganó {orden[0].nombre}!</h2>
            <div className="sub light">con {top} puntos · ¡aplausos! 👏</div>
          </>
        )}

        {/* Estadísticas simpáticas */}
        <div className="card" style={{background:'rgba(255,255,255,.12)',backdropFilter:'blur(4px)',width:'100%',marginTop:14}}>
          <div className="statline"><span className="e">⚡</span> El más rápido
            <b>{rapidoEq? `${rapidoEq.nombre} (${stats.rapido.seg}s)` : '—'}</b></div>
          <div className="statline"><span className="e">⏭️</span> El que más salteó
            <b>{masSalteador && masSalteador.salteos>0? `${masSalteador.nombre} (${masSalteador.salteos})` : 'nadie 😇'}</b></div>
          <div className="statline"><span className="e">🎯</span> Puntos del campeón
            <b>{top}</b></div>
        </div>

        {/* Mini tabla final */}
        <div style={{width:'100%',marginTop:6}}>
          {orden.map((e,r)=>(
            <div className="statline" key={e.id}>
              <span className="e">{r===0?'🥇':r===1?'🥈':r===2?'🥉':'•'}</span>
              {e.nombre}<b>{e.score}</b>
            </div>
          ))}
        </div>
      </div>

      <div className="stack">
        <button className="btn sol" onClick={onReiniciar}>🔁 REVANCHA (mismos equipos)</button>
        <button className="btn ghost" onClick={onInicio}>Volver al inicio</button>
      </div>
    </div>
  );
}

function MuerteSubita({empatados, tiempo, sacarPalabra, onGana}){
  const [idx, setIdx] = useState(0);          // equipo empatado actual
  const [fase, setFase] = useState('reparto'); // reparto | mirar | dibujar
  const [palabra, setPalabra] = useState('');

  const eq = empatados[idx];
  const siguiente = () => setIdx(i => (i+1) % empatados.length);

  if(fase==='reparto'){
    return (
      <div className="screen center fade">
        <span className="pill">⚡ Muerte súbita</span>
        <div className="grow center" style={{gap:16}}>
          <div style={{fontSize:64}}>🔥</div>
          <h2 className="light">El que acierta, gana</h2>
          <div className="card"><div style={{fontFamily:'var(--ft)',fontWeight:900,fontSize:28}}>{eq.nombre}</div></div>
          <div className="sub light">Pasale el celu al dibujante</div>
        </div>
        <button className="btn sol" onClick={()=>{ setPalabra(sacarPalabra()); setFase('mirar'); }}>SOY EL DIBUJANTE 🎨</button>
      </div>
    );
  }
  if(fase==='mirar'){
    return (
      <div className="screen center fade">
        <span className="pill">{eq.nombre}</span>
        <div className="grow center" style={{gap:16}}>
          <div className="sub light">Dibujá esto:</div>
          <div className="card" style={{width:'100%'}}>
            <div style={{fontFamily:'var(--ft)',fontWeight:900,fontSize:'clamp(28px,8vw,42px)',textTransform:'uppercase'}}>{palabra}</div>
          </div>
        </div>
        <button className="btn verde" onClick={()=>{Audio.unlock();setFase('dibujar');}}>¡EMPEZAR! ⏱️</button>
      </div>
    );
  }
  // fase dibujar
  return (
    <Dibujar equipo={eq} palabra={palabra} tiempo={tiempo} penalSaltear={false}
      onResultado={(ok)=>{ if(ok){ Audio.acierto(); vibrar([60,40,120]); onGana(eq.id); } else { siguiente(); setFase('reparto'); } }}
      onSaltear={()=>{ setPalabra(sacarPalabra()); }}
      onTiempo={()=>{ Audio.bocina(); vibrar(300); siguiente(); setFase('reparto'); }} />
  );
}
