<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700..900&family=Nunito:wght@400;600;700;800;900&display=swap');

:root{
  --c1:#5BC8EA; --c2:#4AA3C7; --c3:#3B7FB0; --c4:#2E6A98;
  --sol:#FFD24A; --sol2:#FFE08A;
  --coral:#FF6B6B; --coralD:#E5524B;
  --verde:#2FD27A; --verdeD:#1FA85E;
  --violeta:#8B6FE8; --rosa:#FF7FB6;
  --tinta:#16242E; --suave:#5C7280;
  --ft:'Bricolage Grotesque',system-ui,sans-serif;
  --fb:'Nunito',system-ui,sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--fb); color:var(--tinta); overflow:hidden;
  background:linear-gradient(160deg,var(--c1) 0%, var(--c2) 38%, var(--c3) 72%, var(--c4) 100%);
  user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; position:relative;
}
/* blobs decorativos modernos */
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(60px);opacity:.45;z-index:0;pointer-events:none}
body::before{width:340px;height:340px;background:var(--violeta);top:-120px;right:-90px}
body::after{width:300px;height:300px;background:var(--sol);bottom:-110px;left:-90px;opacity:.35}
#root{height:100%;position:relative;z-index:1}

.screen{height:100%;width:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column;
  padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.grow{flex:1}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.stack{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;align-items:center}
.wrap{flex-wrap:wrap}

h1.logo{font-family:var(--ft);font-weight:900;color:#fff;line-height:.9;
  font-size:clamp(46px,16vw,76px);letter-spacing:-1.5px;text-shadow:0 6px 0 rgba(22,36,46,.18)}
.logo .sol{color:var(--sol)}
.tag{font-family:var(--ft);font-weight:800;color:#fff;font-size:15px;letter-spacing:.4px;opacity:.95}
h2{font-family:var(--ft);font-weight:800;font-size:25px;color:var(--tinta);letter-spacing:-.4px}
h2.light{color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.sub{color:var(--suave);font-weight:700;font-size:14px}
.sub.light{color:rgba(255,255,255,.9)}

.card{background:rgba(255,255,255,.94);border-radius:24px;padding:18px;
  box-shadow:0 14px 34px rgba(16,36,50,.22);backdrop-filter:blur(10px)}
.glass{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);
  border-radius:22px;padding:16px;backdrop-filter:blur(8px)}

.btn{font-family:var(--ft);font-weight:800;font-size:19px;letter-spacing:.2px;border:none;
  border-radius:18px;padding:17px 20px;width:100%;cursor:pointer;color:#fff;
  background:linear-gradient(180deg,#243642,#16242E);box-shadow:0 7px 0 rgba(0,0,0,.28);
  transition:transform .06s,box-shadow .06s;touch-action:manipulation}
.btn:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.28)}
.btn:disabled{opacity:.45;box-shadow:none}
.btn.sol{background:linear-gradient(180deg,var(--sol2),var(--sol));color:var(--tinta);box-shadow:0 7px 0 #D9A82F}
.btn.sol:active{box-shadow:0 2px 0 #D9A82F}
.btn.verde{background:linear-gradient(180deg,var(--verde),var(--verdeD));box-shadow:0 7px 0 #178A4C}
.btn.verde:active{box-shadow:0 2px 0 #178A4C}
.btn.rojo{background:linear-gradient(180deg,var(--coral),var(--coralD));box-shadow:0 7px 0 #B23A34}
.btn.rojo:active{box-shadow:0 2px 0 #B23A34}
.btn.ghost{background:rgba(255,255,255,.14);color:#fff;box-shadow:none;border:2px solid rgba(255,255,255,.5)}
.btn.ghost.dark{color:var(--tinta);border-color:rgba(22,36,46,.2);background:rgba(255,255,255,.5)}
.btn.sm{font-size:15px;padding:12px 14px}
.btn.auto{width:auto}

input.txt{flex:1;font-family:var(--fb);font-weight:700;font-size:16px;color:var(--tinta);background:#fff;
  border:2px solid #E3E8EB;border-radius:14px;padding:13px 14px;outline:none}
input.txt:focus{border-color:var(--c2)}

.chip{font-family:var(--ft);font-weight:800;font-size:14px;border:2px solid #E3E8EB;background:#fff;
  color:var(--suave);border-radius:999px;padding:10px 16px;cursor:pointer;transition:all .12s}
.chip.on{background:var(--c2);color:#fff;border-color:var(--c2);transform:scale(1.03)}

.optname{font-family:var(--ft);font-weight:800;font-size:16px}
.optdesc{font-size:13px;color:var(--suave);font-weight:700}

.catbtn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#fff;
  border:2px solid #E3E8EB;border-radius:16px;padding:14px;cursor:pointer;transition:all .12s}
.catbtn.on{border-color:var(--c2);background:#EAF6FB}
.catbox{width:26px;height:26px;border-radius:8px;border:2px solid #C9D2D7;display:grid;place-items:center;
  font-size:16px;flex-shrink:0;background:#fff;color:#fff}
.catbtn.on .catbox{background:var(--verde);border-color:var(--verde)}
.catemoji{font-size:24px}
.catname{font-family:var(--ft);font-weight:800;font-size:16px}
.catcount{font-size:12px;color:var(--suave);font-weight:800}

.switch{width:56px;height:32px;border-radius:999px;background:#D5DCE0;position:relative;cursor:pointer;transition:.15s;flex-shrink:0}
.switch.on{background:var(--verde)}
.switch .knob{position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.2);transition:.15s}
.switch.on .knob{left:27px}

/* equipos */
.teamcard{border-radius:20px;padding:14px;color:#fff;box-shadow:0 10px 24px rgba(16,36,50,.2)}
.teamhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.teamdot{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;font-size:20px;background:rgba(255,255,255,.25)}
.teamname-in{flex:1;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.4);border-radius:12px;
  padding:10px 12px;color:#fff;font-family:var(--ft);font-weight:800;font-size:17px;outline:none}
.teamname-in::placeholder{color:rgba(255,255,255,.75)}
.player{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border-radius:10px;padding:7px 10px;font-weight:800;font-size:14px}
.player .x{margin-left:auto;opacity:.85;cursor:pointer;font-size:18px;padding:0 4px}
.addp{display:flex;gap:8px;margin-top:8px}
.addp input{flex:1;background:rgba(255,255,255,.24);border:2px solid rgba(255,255,255,.35);border-radius:10px;padding:9px 10px;color:#fff;font-weight:800;outline:none;font-family:var(--fb)}
.addp input::placeholder{color:rgba(255,255,255,.75)}
.addp button{background:#fff;border:none;border-radius:10px;width:44px;font-size:24px;font-weight:800;cursor:pointer}

/* tablero / scoreboard strip */
.boardstrip{display:flex;gap:8px;overflow-x:auto;padding:2px}
.boardchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
  border-radius:14px;padding:9px 12px;color:#fff;flex-shrink:0;backdrop-filter:blur(6px)}
.boardchip .bdot{width:12px;height:12px;border-radius:50%}
.boardchip .bnm{font-family:var(--ft);font-weight:800;font-size:14px;white-space:nowrap}
.boardchip .bpts{font-family:var(--ft);font-weight:900;font-size:18px;margin-left:2px}
.boardchip.lead{background:var(--sol);color:var(--tinta);border-color:var(--sol)}

.scorerow{display:flex;align-items:center;gap:12px;padding:15px;border-radius:18px;background:#fff;
  box-shadow:0 6px 0 rgba(16,36,50,.08);margin-bottom:10px}
.scorerow .rank{font-family:var(--ft);font-weight:900;font-size:22px;width:34px;text-align:center}
.scorerow .nm{flex:1;font-family:var(--ft);font-weight:800;font-size:18px}
.scorerow .pts{font-family:var(--ft);font-weight:900;font-size:28px}
.scorerow .dot{width:14px;height:14px;border-radius:50%}

/* carta de palabra (flip) */
.flip{perspective:1200px;width:100%}
.flip-in{position:relative;width:100%;min-height:190px;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flip.on .flip-in{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center}
.flip-front{background:linear-gradient(150deg,#fff,#EAF6FB);box-shadow:0 14px 34px rgba(16,36,50,.22);border:3px dashed var(--c2)}
.flip-front .q{font-family:var(--ft);font-weight:900;font-size:64px;color:var(--c2)}
.flip-back{background:linear-gradient(150deg,#fff,#FFF6DD);box-shadow:0 14px 34px rgba(16,36,50,.22);
  border:3px solid var(--sol);transform:rotateY(180deg)}
.flip-back .w{font-family:var(--ft);font-weight:900;font-size:clamp(28px,8.5vw,44px);text-transform:uppercase;line-height:1.04;color:var(--tinta)}
.flip-back .cat{margin-top:8px;font-weight:800;font-size:13px;color:var(--suave)}

/* cronómetro circular */
.ringwrap{position:relative;width:min(74vw,280px);height:min(74vw,280px)}
.ringwrap svg{transform:rotate(-90deg)}
.ringtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringtxt .num{font-family:var(--ft);font-weight:900;font-size:clamp(54px,18vw,78px);line-height:1;color:#fff;text-shadow:0 3px 10px rgba(0,0,0,.18)}
.ringtxt .lbl{font-family:var(--ft);font-weight:800;font-size:13px;color:rgba(255,255,255,.85);letter-spacing:2px}
.ringwrap.warn{animation:beat .5s infinite alternate}
@keyframes beat{to{transform:scale(1.05)}}

.peek{width:100%;border:none;border-radius:16px;padding:14px;font-family:var(--ft);font-weight:800;font-size:16px;cursor:pointer;
  background:rgba(255,255,255,.18);color:#fff;border:2px solid rgba(255,255,255,.4)}
.peekword{font-family:var(--ft);font-weight:900;font-size:clamp(26px,8vw,40px);text-transform:uppercase;color:var(--sol)}

.pill{display:inline-block;background:rgba(255,255,255,.22);color:#fff;font-family:var(--ft);font-weight:800;font-size:13px;padding:6px 14px;border-radius:999px;backdrop-filter:blur(6px)}
.hint{font-size:13px;color:rgba(255,255,255,.85);font-weight:700;text-align:center}
.trophy{font-size:96px;animation:bounce 1s infinite alternate ease-in-out}
@keyframes bounce{to{transform:translateY(-16px) rotate(5deg)}}
.statline{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed rgba(255,255,255,.3);color:#fff;font-weight:800}
.statline:last-child{border:none}
.statline .e{font-size:24px}
.statline b{margin-left:auto;font-family:var(--ft);font-weight:900}

.fade{animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
.pop{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}to{transform:scale(1);opacity:1}}
.toast{position:fixed;left:50%;top:16%;transform:translateX(-50%);background:var(--tinta);color:#fff;
  font-family:var(--ft);font-weight:800;padding:14px 22px;border-radius:14px;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:fade .2s}

/* flash de resultado */
.flash{position:fixed;inset:0;z-index:70;pointer-events:none;opacity:0;animation:flash .6s ease}
.flash.ok{background:radial-gradient(circle,rgba(47,210,122,.55),transparent 70%)}
.flash.bad{background:radial-gradient(circle,rgba(229,82,75,.5),transparent 70%)}
@keyframes flash{0%{opacity:0}30%{opacity:1}to{opacity:0}}

/* confeti */
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60}
.confetti span{position:absolute;top:-40px;font-size:22px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(112vh) rotate(540deg);opacity:.95}}

/* accesibilidad */
:focus-visible{outline:3px solid var(--sol);outline-offset:2px}
.teamname-in:focus-visible,.addp input:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(255,255,255,.9)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.player .x{background:none;border:none;color:inherit;font-family:inherit;display:grid;place-items:center;min-width:40px;min-height:40px;margin-left:auto}
.flip[role=button]{cursor:pointer}
/* pausa */
.pausebtn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.45);color:#fff;border-radius:12px;
  min-width:46px;height:46px;font-size:20px;cursor:pointer;font-family:var(--ft);font-weight:900;flex-shrink:0}
.pause-overlay{position:fixed;inset:0;z-index:75;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;background:rgba(22,36,46,.93);color:#fff;text-align:center;padding:24px}
.pause-overlay .big{font-family:var(--ft);font-weight:900;font-size:48px}
</style>
</head>

<script type="text/babel" data-presets="react">
const {useState, useRef, useEffect, useCallback} = React;

/* =====================================================================
   BANCO DE PALABRAS — bien argento, noventoso/dosmilero.
   f = fáciles, d = difíciles. "picante" se activa con el modo after.
   ===================================================================== */
const CATS = [

    f:['asado','choripán','mate','empanada','milanesa','pizza','alfajor','factura','medialuna','helado',

// Categoría picante (modo after/previa): cosas dibujables pero subidas de tono.
const PICANTE = { id:'picante', nombre:'Picante (after/previa)', emoji:'🌶️',
  f:['bombacha','tanga','sostén','calzoncillo','preservativo','beso','corazón roto','vaso de chupito',
     'cigarrillo','cama','ducha','labios','cola','bikini','malla','lengua afuera','botella vacía','baño',
     'gorrito de fiesta','corneta de fiesta'],
  d:['caño de baile','lencería','antifaz','esposas de juguete','pintalabios','tatuaje','piercing','peluca',
     'disfraz','máscara','serpentina','borracho tirado','despedida de soltero','cartel de telo','tacos altos',
     'liga','plumas de cabaret','dado del amor','naipes','cartel de prohibido'] };

const TEAM_COLORS = ['#4AA3C7','#FF6B6B','#2FD27A','#FFA53C','#8B6FE8','#FF7FB6'];
const TEAM_EMOJIS = ['🦊','🐯','🐸','🦁','🐙','🦄','🐧','🐲'];

/* =====================================================================
   AUDIO — tic-tac, fanfarria y bocinazo (Web Audio API, sin archivos)
   ===================================================================== */
const Audio = (() => {
  let ctx = null;
  const ac = () => { if(!ctx){ try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; };
  const beep = (freq,dur,type='sine',vol=0.2,when=0) => {
    const c=ac(); if(!c) return;
    const o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
    const t=c.currentTime+when;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  };
  return {
    unlock(){ const c=ac(); if(c&&c.state==='suspended') c.resume(); },
    tick(){ beep(880,0.05,'square',0.08); },
    tock(){ beep(660,0.05,'square',0.08); },
    flip(){ beep(520,0.07,'triangle',0.18); beep(720,0.07,'triangle',0.14,0.05); },
    acierto(){ [523,659,784,1046].forEach((f,i)=>beep(f,0.18,'triangle',0.25,i*0.09)); },
    bocina(){ beep(180,0.5,'sawtooth',0.3); beep(140,0.55,'sawtooth',0.25,0.05); },
    pop(){ beep(440,0.08,'sine',0.15); },
  };
})();
const vibrar = (ms) => { try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} };

/* Confeti simpático */
function Confetti(){
  const emojis=['🎉','🎊','⭐','✏️','🟡','🔵','🟢','🔴','🟣','🧡'];
  return (
    <div className="confetti">
      {Array.from({length:46}).map((_,i)=>{
        const st={left:(Math.random()*100)+'%',animationDelay:(Math.random()*0.7)+'s',animationDuration:(2+Math.random()*1.6)+'s',fontSize:(16+Math.random()*16)+'px'};
        return <span key={i} style={st}>{emojis[i%emojis.length]}</span>;
      })}
    </div>
  );
}

/* Persistencia en localStorage: config + equipos + partida en curso */
const LS_KEY='dibuja_che_v1';
function cargarGuardado(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'null'); }catch(e){ return null; } }
function guardarEstado(o){ try{ localStorage.setItem(LS_KEY, JSON.stringify(o)); }catch(e){} }

/* =====================================================================
   APP — el celu es el MAZO DE CARTAS (la palabra) + el TABLERO (turnos,
   cronómetro y puntajes). Se dibuja en una pizarra/pared con fibrón.
   ===================================================================== */
function App(){
  const [saved] = useState(()=>cargarGuardado()||{});
  const [pantalla, setPantalla] = useState('inicio');
  const [toast, setToast] = useState('');

  const [equipos, setEquipos] = useState(()=> (Array.isArray(saved.equipos)&&saved.equipos.length>=2) ? saved.equipos : [
    {id:1, nombre:'', jugadores:[], score:0, salteos:0},
    {id:2, nombre:'', jugadores:[], score:0, salteos:0},
  ]);

  const [catsOn, setCatsOn] = useState(() => Array.isArray(saved.catsOn) ? new Set(saved.catsOn) : new Set(CATS.map(c=>c.id)));
  const [dif, setDif] = useState(saved.dif || 'todas');
  const [picante, setPicante] = useState(!!saved.picante);
  const [tiempo, setTiempo] = useState([60,90,120].includes(saved.tiempo)?saved.tiempo:90);
  const [rondas, setRondas] = useState([2,3,5,8].includes(saved.rondas)?saved.rondas:3);
  const [penalSaltear, setPenalSaltear] = useState(!!saved.penalSaltear);

  const [turno, setTurno] = useState(saved.turno && typeof saved.turno==='object' ? saved.turno : {eq:0, ronda:1});
  const [palabra, setPalabra] = useState(saved.palabra || '');
  const [catActual, setCatActual] = useState(saved.catActual || '');
  const [usadas, setUsadas] = useState(() => Array.isArray(saved.usadas) ? new Set(saved.usadas) : new Set());
  const [stats, setStats] = useState(saved.stats || { rapido:null });
  const [resultado, setResultado] = useState(saved.resultado || {});

  const hayPartida = saved.pantalla && ['reparto','mirar','juego','ronda','tablero','fin'].includes(saved.pantalla);

  // guardar en cada cambio relevante (los Set van como array)
  useEffect(()=>{
    guardarEstado({ pantalla, equipos, catsOn:[...catsOn], dif, picante, tiempo, rondas, penalSaltear, turno, palabra, catActual, usadas:[...usadas], stats, resultado });
  }, [pantalla, equipos, catsOn, dif, picante, tiempo, rondas, penalSaltear, turno, palabra, catActual, usadas, stats, resultado]);

  const mostrarToast = (t)=>{ setToast(t); setTimeout(()=>setToast(''),1400); };

  const armarPool = useCallback(() => {
    let lista=[];
    const fuentes=[...CATS]; if(picante) fuentes.push(PICANTE);
    for(const c of fuentes){
      if(c.id!=='picante' && !catsOn.has(c.id)) continue;
      const add=(arr)=>arr.forEach(t=>lista.push({t, cat:c.nombre}));
      if(dif==='todas'||dif==='facil') add(c.f);
      if(dif==='todas'||dif==='dificil') add(c.d);
    }
    return lista;
  }, [catsOn, dif, picante]);

  const sacarPalabra = useCallback((usadasSet) => {
    const pool=armarPool();
    const dispo=pool.filter(p=>!usadasSet.has(p.t));
    const fuente=dispo.length?dispo:pool;
    return fuente[Math.floor(Math.random()*fuente.length)] || {t:'che, dibujá algo', cat:''};
  }, [armarPool]);

  const nuevaPalabra = (set)=>{
    const w=sacarPalabra(set||usadas);
    setPalabra(w.t); setCatActual(w.cat);
    setUsadas(u=>{ const n=new Set(u); n.add(w.t); return n; });
    return w;
  };

  const updEquipo = (i,patch)=>setEquipos(es=>es.map((e,j)=>j===i?{...e,...patch}:e));
  const addEquipo = ()=>setEquipos(es=>es.length>=6?es:[...es,{id:Date.now(),nombre:'',jugadores:[],score:0,salteos:0}]);
  const delEquipo = (i)=>setEquipos(es=>es.length<=2?es:es.filter((_,j)=>j!==i));
  const addJugador = (i,nombre)=>{ const n=nombre.trim(); if(!n) return; setEquipos(es=>es.map((e,j)=>j===i?{...e,jugadores:[...e.jugadores,n]}:e)); };
  const delJugador = (i,j)=>setEquipos(es=>es.map((e,k)=>k===i?{...e,jugadores:e.jugadores.filter((_,m)=>m!==j)}:e));

  const drawerDe = (e)=> (e.jugadores&&e.jugadores.length)? e.jugadores[(e.drawerIdx||0)%e.jugadores.length] : null;

  const empezar = ()=>{
    Audio.unlock();
    const norm=equipos.map((e,i)=>({...e, nombre:e.nombre.trim()||`Equipo ${i+1}`, score:0, salteos:0, drawerIdx:0}));
    setEquipos(norm); setStats({rapido:null}); setUsadas(new Set()); setTurno({eq:0,ronda:1});
    setPantalla('reparto');
  };

  const poolCount = armarPool().length;

  const finTurno = (adivino, segUsados, agoto)=>{
    if(adivino){
      setEquipos(es=>es.map((e,i)=>i===turno.eq?{...e,score:e.score+1}:e));
      Audio.acierto(); vibrar([60,40,120]);
      setStats(s=>(!s.rapido||segUsados<s.rapido.seg)?{...s,rapido:{eq:turno.eq,seg:segUsados}}:s);
    } else { Audio.bocina(); vibrar([300,80,300]); }
    setResultado({adivino, segUsados, agoto});
    setPantalla('ronda');
  };

  const avanzar = ()=>{
    const nextEq=turno.eq+1;
    if(nextEq<equipos.length){ setTurno(t=>({...t,eq:nextEq})); setPantalla('reparto'); }
    else if(turno.ronda<rondas){
      setEquipos(es=>es.map(e=>({...e,drawerIdx:(e.drawerIdx+1)%Math.max(1,(e.jugadores.length||1))})));
      setTurno({eq:0,ronda:turno.ronda+1}); setPantalla('reparto');
    } else setPantalla('tablero');
  };

  // deshacer un acierto marcado por error: revierte el punto y el record, y vuelve a jugar la misma palabra
  const deshacerTurno = ()=>{
    if(resultado.adivino){
      setEquipos(es=>es.map((e,i)=>i===turno.eq?{...e,score:Math.max(0,e.score-1)}:e));
      setStats(s=> (s.rapido && s.rapido.eq===turno.eq && s.rapido.seg===resultado.segUsados) ? {...s, rapido:null} : s);
    }
    setPantalla('juego');
  };

  return (
    <>
      {toast && <div className="toast">{toast}</div>}

      {pantalla==='inicio' && <Inicio onJugar={()=>{Audio.unlock();setPantalla('equipos');}}
        hayPartida={hayPartida} onContinuar={()=>{Audio.unlock();setPantalla(saved.pantalla==='juego'?'mirar':saved.pantalla);}} />}

      {pantalla==='equipos' &&
        <Equipos equipos={equipos} updEquipo={updEquipo} addEquipo={addEquipo} delEquipo={delEquipo}
          addJugador={addJugador} delJugador={delJugador}
          onVolver={()=>setPantalla('inicio')} onSeguir={()=>setPantalla('config')} />}

      {pantalla==='config' &&
        <Config catsOn={catsOn} setCatsOn={setCatsOn} dif={dif} setDif={setDif}
          picante={picante} setPicante={setPicante} tiempo={tiempo} setTiempo={setTiempo}
          rondas={rondas} setRondas={setRondas} penalSaltear={penalSaltear} setPenalSaltear={setPenalSaltear}
          poolCount={poolCount} onVolver={()=>setPantalla('equipos')}
          onJugar={()=>{ if(poolCount<4){mostrarToast('Elegí más categorías 🙏');return;} empezar(); }} />}

      {pantalla==='reparto' &&
        <Reparto equipos={equipos} turno={turno} totalRondas={rondas} drawer={drawerDe(equipos[turno.eq])}
          onListo={()=>{ nuevaPalabra(); setPantalla('mirar'); }} />}

      {pantalla==='mirar' &&
        <Mirar equipo={equipos[turno.eq]} palabra={palabra} cat={catActual}
          onOtra={()=>nuevaPalabra()} onEmpezar={()=>{Audio.unlock();setPantalla('juego');}} />}

      {pantalla==='juego' &&
        <EnJuego equipo={equipos[turno.eq]} palabra={palabra} cat={catActual} tiempo={tiempo} penalSaltear={penalSaltear}
          onResultado={(ok,seg)=>finTurno(ok,seg,false)}
          onTiempo={()=>finTurno(false,tiempo,true)}
          onSaltear={()=>{
            setEquipos(es=>es.map((e,i)=>i===turno.eq?{...e,salteos:e.salteos+1,score:Math.max(0,e.score+(penalSaltear?-1:0))}:e));
            Audio.pop(); nuevaPalabra();
          }} />}

      {pantalla==='ronda' &&
        <FinRonda equipos={equipos} turno={turno} resultado={resultado} onSeguir={avanzar} onDeshacer={deshacerTurno} />}

      {pantalla==='tablero' && <Tablero equipos={equipos} onVerFin={()=>setPantalla('fin')} />}

      {pantalla==='fin' &&
        <Fin equipos={equipos} stats={stats} tiempo={tiempo} nuevaPalabra={nuevaPalabra}
          setEquipos={setEquipos}
          onReiniciar={()=>{
            setEquipos(es=>es.map(e=>({...e,score:0,salteos:0,drawerIdx:0})));
            setStats({rapido:null}); setUsadas(new Set()); setTurno({eq:0,ronda:1}); setPantalla('reparto');
          }}
          onInicio={()=>setPantalla('inicio')} />}
    </>
  );
}

function EnJuego({equipo, palabra, cat, tiempo, penalSaltear, onResultado, onTiempo, onSaltear}){
  const [restante,setRestante]=useState(tiempo);
  const [peek,setPeek]=useState(false);
  const [pausado,setPausado]=useState(false);
  const finRef=useRef(false);
  const pausRef=useRef(false);
  useEffect(()=>{ pausRef.current=pausado; },[pausado]);

  useEffect(()=>{
    finRef.current=false; setRestante(tiempo);
    const id=setInterval(()=>{
      setRestante(r=>{
        if(pausRef.current) return r; // en pausa: no descontar
        const n=r-1;
        if(n<=0){ clearInterval(id); if(!finRef.current){ finRef.current=true; onTiempo(); } return 0; }
        if(n<=5){ Audio.tock(); vibrar(20); } else if(n<=10){ (n%2?Audio.tick():Audio.tock()); }
        return n;
      });
    },1000);
    return ()=>clearInterval(id);
  },[tiempo]);

  const usados=tiempo-restante;
  const frac=restante/tiempo;
  const warn=restante<=10;
  const R=130, C=2*Math.PI*R;
  const col = frac>0.5?'#2FD27A':(frac>0.2?'#FFD24A':'#FF6B6B');

  const adivinaron=()=>{ if(finRef.current) return; finRef.current=true; onResultado(true, usados); };
  const saltear=()=>{ if(finRef.current) return; onSaltear(); };

  return (
    <div className="screen fade">
      <div className="row" style={{justifyContent:'space-between'}}>
        <span className="pill">{equipo.nombre}</span>
        <div className="row" style={{gap:8}}>
          <span className="pill">🖊️ Pizarra</span>
          <button type="button" className="pausebtn" aria-label="Pausar turno" onClick={()=>setPausado(true)}>❚❚</button>
        </div>
      </div>

      <div className="grow center" style={{gap:18}}>
        <div className={'ringwrap'+(warn?' warn':'')}>
          <svg width="100%" height="100%" viewBox="0 0 300 300">
            <circle cx="150" cy="150" r={R} fill="none" stroke="rgba(255,255,255,.22)" strokeWidth="20"/>
            <circle cx="150" cy="150" r={R} fill="none" stroke={col} strokeWidth="20" strokeLinecap="round"
              strokeDasharray={C} strokeDashoffset={C*(1-frac)} style={{transition:'stroke-dashoffset 1s linear, stroke .4s'}}/>
          </svg>
          <div className="ringtxt"><div className="num">{restante}</div><div className="lbl">SEGUNDOS</div></div>
        </div>

        {/* Carta: oculta por defecto, el que dibuja la espía manteniendo apretado */}
        <button className="peek"
          onPointerDown={()=>setPeek(true)} onPointerUp={()=>setPeek(false)}
          onPointerLeave={()=>setPeek(false)} onPointerCancel={()=>setPeek(false)}>
          {peek ? <span className="peekword">{palabra}</span> : <span>👁️ Mantené apretado para ver la palabra</span>}
        </button>
      </div>

      <div className="row">
        <button className="btn rojo" onClick={saltear}>SALTEAR{penalSaltear?' (-1)':''} ⏭️</button>
        <button className="btn verde" onClick={adivinaron}>¡ADIVINARON! ✅</button>
      </div>

      {pausado && <div className="pause-overlay" role="dialog" aria-label="Juego en pausa" onClick={()=>setPausado(false)}>
        <div className="big">❚❚ PAUSA</div>
        <div className="hint">El cronómetro está detenido.</div>
        <button className="btn sol" style={{maxWidth:280}} onClick={()=>setPausado(false)}>▸ SEGUIR</button>
      </div>}
    </div>
  );
}

function FinRonda({equipos, turno, resultado, onSeguir, onDeshacer}){
  const eq=equipos[turno.eq];
  const ok=resultado.adivino;
  return (
    <div className="screen center fade">
      {ok && <Confetti/>}
      <div className={'flash '+(ok?'ok':'bad')}/>
      <BoardStrip equipos={equipos}/>
      <div className="grow center" style={{gap:16}}>
        <div style={{fontSize:84}} className="pop">{ok?'🎉':(resultado.agoto?'⏰':'😬')}</div>
        <h2 className="light">{ok?'¡La sacaron!':(resultado.agoto?'Se acabó el tiempo':'Esta vez no…')}</h2>
        {ok && <div className="sub light">en {resultado.segUsados}s · ¡sos un crack! 😎</div>}
        <div className="card pop" style={{width:'100%'}}>
          <div className="row" style={{justifyContent:'space-between'}}>
            <span className="optname">{eq.nombre}</span>
            <span style={{fontFamily:'var(--ft)',fontWeight:900,fontSize:26,color:ok?'var(--verdeD)':'var(--suave)'}}>{eq.score} {ok&&'(+1)'}</span>
          </div>
        </div>
      </div>
      <div className="stack">
        <button className="btn sol" onClick={onSeguir}>SIGUIENTE TURNO →</button>
        <button className="btn ghost" onClick={onDeshacer}>↶ Ups, me equivoqué (volver a jugar)</button>
      </div>
    </div>
  );
}

function ordenar(equipos){ return equipos.map((e,i)=>({...e,_i:i})).sort((a,b)=>b.score-a.score); }

function Tablero({equipos, onVerFin}){
  const orden=ordenar(equipos);
  return (
    <div className="screen fade">
      <div className="center" style={{marginBottom:16}}><div style={{fontSize:52}} className="pop">📊</div><h2 className="light">Tablero de puntajes</h2></div>
      <div className="grow">
        {orden.map((e,r)=>(
          <div className="scorerow pop" key={e.id} style={{animationDelay:(r*0.05)+'s'}}>
            <span className="rank">{r===0?'🥇':r===1?'🥈':r===2?'🥉':`${r+1}°`}</span>
            <span className="dot" style={{background:TEAM_COLORS[e._i%TEAM_COLORS.length]}}/>
            <span className="nm">{e.nombre}</span>
            <span className="pts">{e.score}</span>
          </div>
        ))}
      </div>
      <button className="btn sol" onClick={onVerFin}>VER GANADOR 🏆</button>
    </div>
  );
}

function Fin({equipos, stats, tiempo, onReiniciar, onInicio, nuevaPalabra, setEquipos}){
  const orden=ordenar(equipos);
  const top=orden[0].score;
  const empatados=orden.filter(e=>e.score===top);
  const hayEmpate=empatados.length>1;
  const masSalteador=[...equipos].sort((a,b)=>b.salteos-a.salteos)[0];
  const rapidoEq=stats.rapido!=null?equipos[stats.rapido.eq]:null;
  const [muerteSubita,setMuerteSubita]=useState(false);

  if(muerteSubita){
    return <MuerteSubita empatados={empatados} tiempo={tiempo} nuevaPalabra={nuevaPalabra}
      onGana={(idGanador)=>{ setEquipos(es=>es.map(e=>e.id===idGanador?{...e,score:e.score+1}:e)); setMuerteSubita(false); }} />;
  }
  return (
    <div className="screen center fade">
      {!hayEmpate && <Confetti/>}
      <div className="grow center" style={{gap:10}}>
        {hayEmpate ? (
          <>
            <div style={{fontSize:72}} className="pop">🤝</div>
            <h2 className="light">¡Empate técnico!</h2>
            <div className="sub light">{empatados.map(e=>e.nombre).join(' y ')} con {top} puntos</div>
            <button className="btn sol" style={{maxWidth:300,marginTop:8}} onClick={()=>setMuerteSubita(true)}>⚡ MUERTE SÚBITA</button>
          </>
        ) : (
          <>
            <div className="trophy">🏆</div>
            <h2 className="light" style={{fontSize:30}}>¡Ganó {orden[0].nombre}!</h2>
            <div className="sub light">con {top} puntos · ¡aplausos! 👏</div>
          </>
        )}
        <div className="glass" style={{width:'100%',marginTop:14}}>
          <div className="statline"><span className="e">⚡</span> El más rápido <b>{rapidoEq?`${rapidoEq.nombre} (${stats.rapido.seg}s)`:'—'}</b></div>
          <div className="statline"><span className="e">⏭️</span> El que más salteó <b>{masSalteador&&masSalteador.salteos>0?`${masSalteador.nombre} (${masSalteador.salteos})`:'nadie 😇'}</b></div>
          <div className="statline"><span className="e">🎯</span> Puntos del campeón <b>{top}</b></div>
        </div>
        <div style={{width:'100%',marginTop:6}}>
          {orden.map((e,r)=>(<div className="statline" key={e.id}><span className="e">{r===0?'🥇':r===1?'🥈':r===2?'🥉':'•'}</span>{e.nombre}<b>{e.score}</b></div>))}
        </div>
      </div>
      <div className="stack">
        <button className="btn sol" onClick={onReiniciar}>🔁 REVANCHA (mismos equipos)</button>
        <button className="btn ghost" onClick={onInicio}>Volver al inicio</button>
      </div>
    </div>
  );
}

function MuerteSubita({empatados, tiempo, nuevaPalabra, onGana}){
  const [idx,setIdx]=useState(0);
  const [fase,setFase]=useState('reparto');
  const [pal,setPal]=useState({t:'',cat:''});
  const eq=empatados[idx];
  const siguiente=()=>setIdx(i=>(i+1)%empatados.length);

  if(fase==='reparto'){
    return (
      <div className="screen center fade">
        <span className="pill">⚡ Muerte súbita</span>
        <div className="grow center" style={{gap:16}}>
          <div style={{fontSize:64}} className="pop">🔥</div>
          <h2 className="light">El que acierta, gana</h2>
          <div className="card pop"><div style={{fontFamily:'var(--ft)',fontWeight:900,fontSize:28}}>{eq.nombre}</div></div>
          <div className="hint">Pasale el celu al que dibuja</div>
        </div>
        <button className="btn sol" onClick={()=>{ const w=nuevaPalabra(); setPal(w); setFase('mirar'); }}>SOY EL QUE DIBUJA 🖊️</button>
      </div>
    );
  }
  if(fase==='mirar'){
    return (
      <div className="screen center fade">
        <span className="pill">{eq.nombre}</span>
        <div className="grow center" style={{gap:16,width:'100%'}}>
          <div className="sub light">Dibujá esto en la pizarra:</div>
          <div className="card" style={{width:'100%'}}>
            <div style={{fontFamily:'var(--ft)',fontWeight:900,fontSize:'clamp(28px,8vw,42px)',textTransform:'uppercase'}}>{pal.t}</div>
            {pal.cat && <div className="sub" style={{marginTop:6}}>{pal.cat}</div>}
          </div>
        </div>
        <button className="btn verde" onClick={()=>{Audio.unlock();setFase('juego');}}>¡A LA PIZARRA! ⏱️</button>
      </div>
    );
  }
  return (
    <EnJuego equipo={eq} palabra={pal.t} cat={pal.cat} tiempo={tiempo} penalSaltear={false}
      onResultado={(ok)=>{ if(ok){ onGana(eq.id); } else { siguiente(); setFase('reparto'); } }}
      onTiempo={()=>{ Audio.bocina(); vibrar(300); siguiente(); setFase('reparto'); }}
      onSaltear={()=>{ const w=nuevaPalabra(); setPal(w); }} />
  );
}
